// ─────────────────────────────────────────
const MOVE_KEYS = {
  'ArrowUp':[-1],'ArrowDown':[1],'ArrowLeft':[-1,0],'ArrowRight':[1,0], // handled below
};

function dirFromKey(key) {
  switch(key) {
    case 'ArrowUp': case 'w': case 'W': return [0,-1];
    case 'ArrowDown': case 's': case 'S': return [0,1];
    case 'ArrowLeft': case 'a': case 'A': return [-1,0];
    case 'ArrowRight': case 'd': case 'D': return [1,0];
  }
  return null;
}

document.addEventListener('keydown', e=>{
  if (!_jinglePlayed) playTitleJingle();
  if (titleScreen) { titleInput(e); return; }

  if (classSelect) {
    if (e.key==='Escape') { classSelect=false; resize(); return; }
    if (e.key==='ArrowUp'||e.key==='w') { classCursor=(classCursor-1+CLASSES.length)%CLASSES.length; renderClassSelect(); return; }
    if (e.key==='ArrowDown'||e.key==='s') { classCursor=(classCursor+1)%CLASSES.length; renderClassSelect(); return; }
    if (e.key>='1'&&e.key<='4') { classCursor=parseInt(e.key)-1; renderClassSelect(); return; }
    if (e.key==='Enter') {
      classSelect=false;
      titleScreen=false;
      G.difficulty=pendingDifficulty;
      G.playerClass=CLASSES[classCursor];
      deleteSave();
      newGame();
      resize();
      const diffNames = {easy:'Easy 🟢', normal:'Normal 🟡', hardcore:'Hardcore 🔴'};
      msg(`Difficulty: ${diffNames[G.difficulty]||G.difficulty}`,'#fa0');
      msg(`Class: ${G.playerClass.icon} ${G.playerClass.name} — ${G.playerClass.passive.name}`,'#a88040');
    }
    return;
  }

  // Victory screen
  if (G.victoryScreen){
    if(e.key==='Enter'){ deleteSave(); newGame(); }
    return;
  }

  // Pending victory (boss just killed)
  if(G.pendingVictory){
    if(e.key==='Enter'){ G.pendingVictory=false; G.victoryScreen=true; loop(); return; }
    if(e.key==='c'||e.key==='C'){ G.pendingVictory=false; msg("You continue exploring deeper floors...",'#888'); loop(); return; }
    return;
  }

  if (G.dead) {
    if (e.key==='r'||e.key==='R') { deleteSave(); newGame(); }
    return;
  }

  // Help screen
  if (G.helpOpen) { G.helpOpen=false; loop(); return; }

  // Ability management screen
  if (G.abilitiesOpen) {
    const p = G.player;
    if (e.key==='Escape'||e.key==='f'||e.key==='F') {
      G.abilitiesOpen=false;
    } else if (e.key==='ArrowUp'||e.key==='w'||e.key==='W') {
      G.abilityCursor = Math.max(0, G.abilityCursor-1);
    } else if (e.key==='ArrowDown'||e.key==='s'||e.key==='S') {
      G.abilityCursor = Math.min(p.abilities.length-1, G.abilityCursor+1);
    } else if (['1','2','3','4','5'].includes(e.key)) {
      const slot = parseInt(e.key)-1;
      const ab = p.abilities[G.abilityCursor];
      if (ab) {
        // rimuovi da eventuale slot precedente
        const old = p.hotbar.indexOf(ab.id);
        if (old>=0) p.hotbar[old]=null;
        p.hotbar[slot]=ab.id;
        msg(`${ab.name} → slot ${'QERTY'[slot]}`, '#0af');
      }
    } else if (e.key==='x'||e.key==='X') {
      const ab = p.abilities[G.abilityCursor];
      if (ab) {
        const slot = p.hotbar.indexOf(ab.id);
        if (slot>=0) { p.hotbar[slot]=null; msg(`${ab.name} removed from slot`, '#888'); }
        else msg(`${ab.name} was not equipped`, '#666');
      }
    }
    e.preventDefault(); loop(); return;
  }

  // Ability choice screen (after level up)
  if (G.abilityChoices) {
    const choices = G.abilityChoices;
    if (e.key==='s'||e.key==='S'||e.key==='Escape') {
      G.abilityChoices=null; msg('You skip the ability choice.','#888');
    } else {
      const idx=parseInt(e.key)-1;
      if (idx>=0 && idx<choices.length) {
        const ab = {...choices[idx], _cd:0};
        if (G.player.abilities.length<15) {
          G.player.abilities.push(ab);
          // Auto-equip nel primo slot libero
          const emptySlot = G.player.hotbar.indexOf(null);
          if (emptySlot >= 0) G.player.hotbar[emptySlot] = ab.id;
          msg(`You learn: ${ab.name}!${emptySlot>=0?' (slot '+'QERTY'[emptySlot]+')':''}`, '#0af'); SFX.levelup();
          checkSynergies();
        } else { msg('You already have 15 abilities! (max reached)','#f44'); }
        G.abilityChoices=null;
      }
    }
    loop(); return;
  }

  // Level up stat screen
  if (G.lvlUp>0) {
    const p=G.player;
    if (e.key==='1') { p.str++; if(p._baseStr!==undefined) p._baseStr++; spendPt(); }
    else if (e.key==='2') { p.dex++; if(p._baseDex!==undefined) p._baseDex++; spendPt(); }
    else if (e.key==='3') { p.int++; if(p._baseInt!==undefined) p._baseInt++; spendPt(); }
    else if (e.key==='4') { p.vit++; spendPt(); }
    else if (e.key==='5') { p.wil++; spendPt(); }
    recalcStats();
    loop(); return;
  }

  // Ranged targeting mode
  if (G.rangedMode) {
    if (e.key==='Escape') {
      G.rangedMode=false; G.rangedTarget=null; G.rangedItem=null;
      msg('Aim cancelled.','#888');
    } else if (e.key==='Enter') {
      const t=G.rangedTarget;
      if (t) {
        if (G.rangedItem) {
          doThrowItem(G.rangedItem, t.x, t.y);
        } else {
          doShoot(t.x, t.y);
        }
        G.rangedMode=false; G.rangedTarget=null; G.rangedItem=null;
      }
    } else {
      const dir=dirFromKey(e.key);
      if (dir && G.rangedTarget) {
        G.rangedTarget = {x: G.rangedTarget.x+dir[0], y: G.rangedTarget.y+dir[1]};
        G.rangedTarget.x = Math.max(0,Math.min(COLS-1,G.rangedTarget.x));
        G.rangedTarget.y = Math.max(0,Math.min(ROWS-1,G.rangedTarget.y));
      }
    }
    e.preventDefault(); loop(); return;
  }

  // Ability targeting mode
  if (G.abilityTarget) {
    if (e.key==='Escape') {
      // Cancel: refund
      const t=G.abilityTarget; G.abilityTarget=null;
      G.player.mp+=t.ab.cost.mp; t.ab._cd=0;
      msg('Ability cancelled.','#888');
      loop(); return;
    }
    const dir=dirFromKey(e.key);
    if (dir) { resolveAbilityTarget(dir[0],dir[1]); e.preventDefault(); loop(); return; }
    return;
  }

  // Crafting screen
  if (G.craftOpen) {
    if (e.key==='Escape') { G.craftOpen=false; G.craftSelect=-1; G.craftCursor=0; }
    else if (e.key==='ArrowUp'||e.key==='w'||e.key==='W') {
      G.craftCursor = Math.max(0, G.craftCursor-1);
    } else if (e.key==='ArrowDown'||e.key==='s'||e.key==='S') {
      G.craftCursor = Math.min(Math.max(0,G.player.inv.length-1), G.craftCursor+1);
    } else if (e.key==='Enter') {
      const idx = G.craftCursor;
      if (idx>=0 && idx<G.player.inv.length) {
        if (G.craftSelect<0) {
          G.craftSelect=idx;
          msg(`First: ${G.player.inv[idx].name}. Choose the second and press Enter.`, '#fa0');
        } else if (idx===G.craftSelect) {
          G.craftSelect=-1; msg('Selection cancelled.','#888');
        } else {
          const ok = doFusion(G.craftSelect, idx);
          G.craftSelect=-1; G.craftCursor=0;
          if (ok) { G.craftOpen=false; recalcStats(); }
        }
      }
    } else {
      const idx=parseInt(e.key);
      if (!isNaN(idx) && idx>=0 && idx<G.player.inv.length) {
        G.craftCursor=idx;
        if (G.craftSelect<0) { G.craftSelect=idx; }
        else if (idx===G.craftSelect) { G.craftSelect=-1; }
        else {
          const ok = doFusion(G.craftSelect, idx);
          G.craftSelect=-1;
          if (ok) { G.craftOpen=false; recalcStats(); }
        }
      }
    }
    loop(); return;
  }

  // Shop screen
  if (G.shopOpen) {
    const list = G.shopTab==='buy' ? (G.merchant?.stock||[]) : G.player.inv;
    if (e.key==='Escape') G.shopOpen=false;
    else if (e.key==='b'||e.key==='B') { G.shopTab='buy'; G.shopCursor=0; }
    else if (e.key==='v'||e.key==='V') { G.shopTab='sell'; G.shopCursor=0; }
    else if (e.key==='c'||e.key==='C') { G.shopTab='curse'; G.shopCursor=0; }
    else if (e.key==='ArrowUp'||e.key==='w'||e.key==='W') {
      G.shopCursor = Math.max(0, G.shopCursor-1);
    } else if (e.key==='ArrowDown'||e.key==='s'||e.key==='S') {
      G.shopCursor = Math.min(Math.max(0,list.length-1), G.shopCursor+1);
    } else if (e.key==='Enter') {
      if (G.shopTab==='buy') shopBuy(G.shopCursor);
      else if (G.shopTab==='sell') shopSell(G.shopCursor);
      else if (G.shopTab==='curse') {
        const cursedSlot = [G.player.weapon,G.player.armor,G.player.headgear,G.player.footwear,G.player.ring1,G.player.ring2].find(s=>s&&s.cursed&&!s._curseBroken);
        if(!cursedSlot){ msg("No cursed items equipped",'#888'); }
        else if(G.player.gold<150){ msg("Not enough gold (150 required)",'#f44'); }
        else { G.player.gold-=150; cursedSlot._curseBroken=true; msg(`The merchant removes the curse from ${cursedSlot.name}!`,'#c0f'); }
      }
    } else {
      const idx=parseInt(e.key);
      if (!isNaN(idx)&&idx>=0) {
        G.shopCursor=idx;
        if (G.shopTab==='buy') shopBuy(idx);
        else if (G.shopTab==='sell') shopSell(idx);
      }
    }
    loop(); return;
  }

  // Inventory screen
  if (G.invOpen) {
    const k = e.key;
    const p = G.player;
    if(k==='Escape'||k==='i'||k==='I'){ G.invOpen=false; G.invDrop=false; loop(); return; }
    const totalRows = 6 + p.inv.length;
    if(G.invCursor===undefined) G.invCursor=0;
    if(k==='ArrowUp'||k==='w'||k==='W'){ G.invCursor=Math.max(0,G.invCursor-1); e.preventDefault(); loop(); return; }
    if(k==='ArrowDown'||k==='s'||k==='S'){ G.invCursor=Math.min(totalRows-1,G.invCursor+1); e.preventDefault(); loop(); return; }

    // X = drop equipped item or backpack item
    if(k==='x'||k==='X'){
      const eqSlotNames = ['weapon','armor','headgear','footwear','ring1','ring2'];
      if(G.invCursor<6){
        const slotName = eqSlotNames[G.invCursor];
        const it = p[slotName];
        if(!it){ loop(); return; }
        if(it.cursed && !it._curseBroken){ msg("Cursed item! You cannot remove it!",'#c0f'); loop(); return; }
        p[slotName]=null;
        G.items.push({...it, x:G.player.x, y:G.player.y});
        msg(`You drop ${it.name}`,'#f84');
        recalcStats();
      } else {
        const idx = G.invCursor-6;
        if(idx<p.inv.length){
          const it = p.inv.splice(idx,1)[0];
          G.items.push({...it, x:G.player.x, y:G.player.y});
          msg(`You drop ${it.name}`,'#f84');
          if(G.invCursor>=6+p.inv.length) G.invCursor=Math.max(0,G.invCursor-1);
        }
      }
      e.preventDefault(); loop(); return;
    }

    // Enter/Space = use/equip selected item
    if(k==='Enter'||k===' '){
      const eqSlotNames = ['weapon','armor','headgear','footwear','ring1','ring2'];
      if(G.invCursor<6){
        const slotName = eqSlotNames[G.invCursor];
        const it = p[slotName];
        if(!it){ loop(); return; }
        if(it.cursed && !it._curseBroken){ msg(`${it.name}: cursed! Kill ${it.curseCharges} enemies to free it`,'#c0f'); loop(); return; }
        if(p.inv.length<12){ p.inv.push(it); p[slotName]=null; msg(`Removed ${it.name}`,'#888'); recalcStats(); }
        else { msg("Backpack full!",'#f44'); }
      } else {
        const idx = G.invCursor-6;
        if(idx<p.inv.length){
          if(G.invDrop){ dropItem(idx); G.invDrop=false; }
          else useItem(idx);
        }
      }
      e.preventDefault(); loop(); return;
    }

    // D key: toggle drop mode
    if(k==='d'||k==='D'){
      if(G.invCursor>=6 && p.inv.length){
        G.invDrop=true;
        msg(`Press Enter to drop: ${p.inv[G.invCursor-6]?.name||'?'}  [Esc cancel]`,'#888');
      }
      loop(); return;
    }

    // G key: throw item
    if(k==='g'||k==='G'){
      if(G.invCursor>=6){
        const it = p.inv[G.invCursor-6];
        if(it){
          G.rangedItem = {item:it, idx:G.invCursor-6};
          G.rangedTarget = {x:p.x, y:p.y};
          G.rangedMode = true;
          G.invOpen = false;
          G.invDrop = false;
          msg(`Throw ${it.name}: use arrows to aim, Enter to throw, Esc cancel`,'#fa0');
        }
      }
      loop(); return;
    }

    // Number keys still work for backpack
    const num = parseInt(k);
    if(!isNaN(num)&&num>=1&&num<=9){
      const idx = num-1;
      if(idx<p.inv.length){ G.invCursor=6+idx; useItem(idx); }
      e.preventDefault(); loop();
      return;
    }
    loop(); return;
  }

  // Ability hotkeys: Q E R T Y U O P → slot 0-7
  const abKeys = {q:0,e:1,r:2,t:3,y:4,u:5,o:6,p:7};
  if (abKeys[e.key.toLowerCase()] !== undefined) {
    useAbility(abKeys[e.key.toLowerCase()]);
    e.preventDefault(); loop(); return;
  }

  let handled=true;
  switch(e.key) {
    case 'ArrowUp':  case 'w': case 'W': case 'k': tryMove( 0,-1); break;
    case 'ArrowDown':case 's': case 'S': case 'j': tryMove( 0, 1); break;
    case 'ArrowLeft':case 'a': case 'A': case 'h': tryMove(-1, 0); break;
    case 'ArrowRight':case'd': case 'D': case 'l': tryMove( 1, 0); break;
    case '.': case 'z': case 'Z': endTurn(); break;
    case 'i': case 'I': G.invOpen=true; break;
    case 'f': case 'F': G.abilitiesOpen=true; G.abilityCursor=0; break;
    case '?': case 'F1': G.helpOpen=true; break;
    case '>':
      if (G.map[G.player.y][G.player.x]===TILE.STAIRS) {
        G.floor++; buildFloor(); computeFOV(); updateCam();
        msg(`You descend to floor ${G.floor}...`, '#0ff'); SFX.stairs();
        // Haruspex passive: MP regen on floor change
        if (G.player.classPassive && G.player.classPassive.mpRegenFloor) {
          const regen = G.player.classPassive.mpRegenFloor;
          G.player.mp = Math.min(G.player.mp + regen, G.player.maxMp);
          msg(`Divination restores ${regen} MP.`, '#88f');
        }
        saveGame(); // auto-save on floor change
      }
      break;
    case 'F5': saveGame(); break;
    case 'g': case 'G':
      // Shoot (equipped bow) or throw item
      if (G.player.weapon && G.player.weapon.ranged) {
        const ammo=G.player.inv.find(i=>i.type==='ammo');
        if (!ammo) { msg('No arrows/bolts!','#f44'); break; }
        G.rangedMode=true;
        G.rangedTarget={x:G.player.x, y:G.player.y};
        G.rangedItem=null;
        msg(`[${G.player.weapon.name}] Use arrows to aim, Enter to shoot, Esc cancel`,'#0af');
      } else {
        // Throw from inventory menu
        G.invOpen=true;
        G.invDrop=false;
        msg('Choose what to throw: [Up/Down] navigate, [G] throw, [Esc] cancel','#fa0');
      }
      break;
    default: handled=false;
  }
  if (handled) { e.preventDefault(); loop(); }
});

function spendPt() {
  G.player.statPts--;
  if (G.player.statPts<=0) {
    G.lvlUp--;
    G.player.statPts=0;
    // After stats, offer ability choice
    if (G.lvlUp<=0) {
      const choices = getAbilityChoices();
      if (choices.length>0) G.abilityChoices = choices;
    }
  }
}

function resize() {
  canvas=document.getElementById('canvas');
  ctx=canvas.getContext('2d');
  const hud=document.getElementById('hud');
  const msgEl=document.getElementById('msgbox');
  canvas.width=window.innerWidth;
  if (titleScreen || classSelect) {
    hud.style.display='none'; msgEl.style.display='none';
    canvas.height=window.innerHeight;
    if (classSelect) renderClassSelect();
    else renderTitle();
    return;
  }
  hud.style.display=''; msgEl.style.display='';
  const hRect = hud.getBoundingClientRect();
  const mRect = msgEl.getBoundingClientRect();
  canvas.height=window.innerHeight - hRect.height - mRect.height - 2;
  updateCam();
  loop();
}

window.addEventListener('resize', resize);

// ─────────────────────────────────────────
//  TITLE SCREEN + INIT
// ─────────────────────────────────────────
let titleScreen = true;
let classSelect = false;
let classCursor = 0;
let pendingDifficulty = null;

function renderTitle() {
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const cw=canvas.width/2, ch=canvas.height;
  ctx.textAlign='center';

  const sc = Math.min(1, ch / 580);
  let y = Math.round(40 * sc) + 10;

  ctx.font=`bold ${Math.round(42*sc)}px Courier New`;
  ctx.fillStyle='#a88040';
  ctx.fillText('SUBUMBRA', cw, y); y+=Math.round(36*sc);

  ctx.font=`bold ${Math.round(13*sc)}px Courier New`;
  ctx.fillStyle='#886830';
  ctx.fillText('— Augusta Praetoria, XXX A.D. —', cw, y); y+=Math.round(24*sc);

  const story = [
    { text: 'You are a stonemason. The Emperor has ordered', col: '#999' },
    { text: 'a new forum built at the heart of the colony.', col: '#999' },
    { text: '', col: '#000' },
    { text: 'Your chisel breaks through bedrock', col: '#c89050' },
    { text: 'into a sealed chamber. Salassi runes cover the walls.', col: '#c89050' },
    { text: 'The air is cold. The stones are older than Rome.', col: '#c89050' },
    { text: '', col: '#000' },
    { text: '🔦  Something watches from the dark.', col: '#a04040' },
  ];
  const storyLH = Math.round(16*sc);
  ctx.font=`${Math.round(12*sc)}px Courier New`;
  story.forEach((line) => {
    ctx.fillStyle = line.col;
    ctx.fillText(line.text, cw, y); y+=storyLH;
  });

  y+=Math.round(18*sc);
  ctx.font=`bold ${Math.round(13*sc)}px Courier New`;
  ctx.fillStyle='#777';
  ctx.fillText('── NEW GAME ──', cw, y); y+=Math.round(26*sc);

  const optLH = Math.round(24*sc);
  ctx.font=`bold ${Math.round(14*sc)}px Courier New`;
  ctx.fillStyle='#8f8';
  ctx.fillText('[1] Easy', cw, y); y+=Math.round(14*sc);
  ctx.font=`${Math.round(10*sc)}px Courier New`;
  ctx.fillStyle='#6a6';
  ctx.fillText('slow regen — the gods still watch over you', cw, y); y+=optLH;

  ctx.font=`bold ${Math.round(14*sc)}px Courier New`;
  ctx.fillStyle='#ff6';
  ctx.fillText('[2] Normal', cw, y); y+=Math.round(14*sc);
  ctx.font=`${Math.round(10*sc)}px Courier New`;
  ctx.fillStyle='#aa8';
  ctx.fillText('no regen — you are on your own', cw, y); y+=optLH;

  ctx.font=`bold ${Math.round(14*sc)}px Courier New`;
  ctx.fillStyle='#f44';
  ctx.fillText('[3] Hardcore', cw, y); y+=Math.round(14*sc);
  ctx.font=`${Math.round(10*sc)}px Courier New`;
  ctx.fillStyle='#a44';
  ctx.fillText('hunger + no regen — true darkness awaits', cw, y); y+=optLH;

  if (hasSave()) {
    ctx.font=`bold ${Math.round(14*sc)}px Courier New`;
    ctx.fillStyle='#0af';
    ctx.fillText('[C] Continue — the depths remember', cw, y); y+=optLH;
  }

  ctx.fillStyle='#444';
  ctx.font=`${Math.round(10*sc)}px Courier New`;
  ctx.fillText('F5: Save  |  ?: Help', cw, Math.max(y+10, ch-10));

  ctx.textAlign='left'; ctx.font=FONT;
}

function renderClassSelect() {
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const cw=canvas.width/2, ch=canvas.height;
  ctx.textAlign='center';

  const sc = Math.min(1, ch / 600);
  let y = Math.round(30 * sc) + 10;

  ctx.font=`bold ${Math.round(28*sc)}px Courier New`;
  ctx.fillStyle='#a88040';
  ctx.fillText('CHOOSE YOUR PATH', cw, y); y+=Math.round(40*sc);

  CLASSES.forEach((cls, i) => {
    const sel = (i === classCursor);
    const boxY = y;
    const boxH = Math.round(90*sc);

    if (sel) {
      ctx.fillStyle='#1a1a10';
      ctx.fillRect(cw-260, boxY-10, 520, boxH);
      ctx.strokeStyle='#a88040';
      ctx.lineWidth=2;
      ctx.strokeRect(cw-260, boxY-10, 520, boxH);
    }

    ctx.fillStyle = sel ? '#a88040' : '#666';
    ctx.font=`bold ${Math.round(16*sc)}px Courier New`;
    ctx.fillText(`[${i+1}]  ${cls.icon}  ${cls.name}`, cw, boxY+Math.round(10*sc));

    ctx.fillStyle = sel ? '#ccc' : '#555';
    ctx.font=`${Math.round(11*sc)}px Courier New`;
    ctx.fillText(cls.desc, cw, boxY+Math.round(30*sc));

    const s = cls.stats;
    ctx.fillStyle = sel ? '#888' : '#444';
    ctx.font=`${Math.round(10*sc)}px Courier New`;
    ctx.fillText(`STR ${s.str}  DEX ${s.dex}  INT ${s.int}  VIT ${s.vit}  WIL ${s.wil}`, cw, boxY+Math.round(48*sc));

    ctx.fillStyle = sel ? '#c89050' : '#554430';
    ctx.font=`${Math.round(10*sc)}px Courier New`;
    ctx.fillText(`✦ ${cls.passive.name}: ${cls.passive.desc}`, cw, boxY+Math.round(62*sc));

    y += boxH + Math.round(8*sc);
  });

  y += Math.round(10*sc);
  ctx.fillStyle='#555';
  ctx.font=`${Math.round(11*sc)}px Courier New`;
  ctx.fillText('↑↓ or 1-4 to select  |  Enter to confirm  |  Esc to go back', cw, y);

  ctx.textAlign='left'; ctx.font=FONT;
}

function titleInput(e) {
  playTitleJingle();
  const startNew = (diff) => {
    pendingDifficulty = diff;
    classSelect = true;
    classCursor = 0;
    resize();
    deleteSave();
    newGame();
    resize();
    const diffNames = {easy:'Easy 🟢', normal:'Normal 🟡', hardcore:'Hardcore 🔴'};
    msg(`Difficulty: ${diffNames[diff]}`, diff==='easy'?'#8f8':diff==='hardcore'?'#f44':'#ff6');
  };
  if (e.key==='1') startNew('easy');
  else if (e.key==='2'||e.key==='n'||e.key==='N') startNew('normal');
  else if (e.key==='3') startNew('hardcore');
  else if ((e.key==='c' || e.key==='C') && hasSave()) {
    titleScreen = false;
    newGame();
    loadGame();
    resize();
    loop();
  }
}

canvas = document.getElementById('canvas');
ctx = canvas.getContext('2d');
resize();
// Always show title (difficulty selection + possible Continue)
renderTitle();
</script>
</body>
