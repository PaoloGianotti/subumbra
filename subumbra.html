let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, dur, type='square', vol=0.08, slide=0) {
  const ac = getAudio();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(freq+slide, ac.currentTime+dur);
  gain.gain.setValueAtTime(vol, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
  osc.connect(gain); gain.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime+dur);
}

// Title jingle: dark, mysterious, Roman catacomb atmosphere
let _jinglePlayed = false;
function playTitleJingle() {
  if (_jinglePlayed) return;
  _jinglePlayed = true;
  const ac = getAudio();
  const now = ac.currentTime + 0.15;

  // Note with slow attack/decay envelope (eerie, reverberant feel)
  function n(freq, start, len, vol=0.10, type='sine') {
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0, now+start);
    g.gain.linearRampToValueAtTime(vol, now+start+len*0.15);
    g.gain.setValueAtTime(vol*0.7, now+start+len*0.6);
    g.gain.exponentialRampToValueAtTime(0.001, now+start+len);
    o.connect(g); g.connect(ac.destination);
    o.start(now+start); o.stop(now+start+len+0.1);
  }

  // Vibrato note (ghostly, wavering)
  function nv(freq, start, len, vol=0.10) {
    const o = ac.createOscillator();
    const lfo = ac.createOscillator();
    const lfoGain = ac.createGain();
    const g = ac.createGain();
    o.type='sine'; o.frequency.value=freq;
    lfo.type='sine'; lfo.frequency.value=4; // slow vibrato
    lfoGain.gain.value=6;
    lfo.connect(lfoGain); lfoGain.connect(o.frequency);
    g.gain.setValueAtTime(0, now+start);
    g.gain.linearRampToValueAtTime(vol, now+start+len*0.2);
    g.gain.setValueAtTime(vol*0.6, now+start+len*0.7);
    g.gain.exponentialRampToValueAtTime(0.001, now+start+len);
    o.connect(g); g.connect(ac.destination);
    o.start(now+start); o.stop(now+start+len+0.1);
    lfo.start(now+start); lfo.stop(now+start+len+0.1);
  }

  // Low rumble (sub-bass drone)
  function drone(freq, start, len, vol=0.08) {
    const o = ac.createOscillator();
    const g = ac.createGain();
    const filt = ac.createBiquadFilter();
    o.type='sawtooth'; o.frequency.value=freq;
    filt.type='lowpass'; filt.frequency.value=120;
    g.gain.setValueAtTime(0, now+start);
    g.gain.linearRampToValueAtTime(vol, now+start+len*0.3);
    g.gain.exponentialRampToValueAtTime(0.001, now+start+len);
    o.connect(filt); filt.connect(g); g.connect(ac.destination);
    o.start(now+start); o.stop(now+start+len+0.1);
  }

  // Deep percussion (stone impact)
  function boom(start, vol=0.15) {
    const buf = ac.createBuffer(1, ac.sampleRate*0.3, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const src = ac.createBufferSource();
    const g = ac.createGain();
    const filt = ac.createBiquadFilter();
    filt.type='lowpass'; filt.frequency.value=100;
    src.buffer=buf;
    g.gain.setValueAtTime(vol, now+start);
    g.gain.exponentialRampToValueAtTime(0.001, now+start+0.4);
    src.connect(filt); filt.connect(g); g.connect(ac.destination);
    src.start(now+start);
  }

  // Tempo: 60 BPM — slow, ominous
  const B = 1.0; // one beat = 1 second
  const h = B/2;

  // === PHASE 1: Deep drone — entering the catacombs (0..3s) ===
  drone(55, 0, B*4, 0.10);     // Sub-bass A1
  drone(82, 0.5, B*3, 0.06);   // E2 — dark fifth
  boom(0.1);                     // Stone door opening
  boom(B*1.5, 0.08);            // Distant echo

  // === PHASE 2: Descending minor melody — mystery and dread (1..5s) ===
  // Phrygian descent: E-F-G-Ab — ancient, liturgical feel
  n(330, B*1,   B*0.8, 0.09, 'sine');     // E4
  n(349, B*1.8, B*0.8, 0.08, 'sine');     // F4 — Phrygian semitone
  n(311, B*2.6, B*1.0, 0.09, 'sine');     // Eb4 — tritone tension
  n(294, B*3.6, B*1.2, 0.10, 'sine');     // D4 — resolution into darkness

  // Ghostly countermelody (higher octave, wavering)
  nv(660, B*1.5, B*1.5, 0.04);   // E5 ghost
  nv(698, B*3.0, B*1.2, 0.03);   // F5 ghost

  // === PHASE 3: Ancient chant — rising awe (5..8s) ===
  // Open fifths like Gregorian chant
  n(220, B*5, B*1.5, 0.11, 'triangle'); // A3
  n(330, B*5, B*1.5, 0.08, 'sine');     // E4 — perfect fifth
  boom(B*5, 0.12);

  n(196, B*6.5, B*1.5, 0.11, 'triangle'); // G3
  n(294, B*6.5, B*1.5, 0.08, 'sine');     // D4 — perfect fifth

  // Sub-drone swells
  drone(55, B*5, B*4, 0.12);

  // === PHASE 4: Climax — revelation of the darkness (8..11s) ===
  // Minor chord swell: Am (A-C-E)
  n(220, B*8, B*2, 0.12, 'triangle');   // A3
  n(262, B*8, B*2, 0.09, 'sine');       // C4
  n(330, B*8, B*2, 0.08, 'sine');       // E4
  nv(440, B*8.5, B*2.5, 0.07);          // A4 — wavering high
  boom(B*8, 0.18);

  // Descending chromatic fade — into the unknown
  n(330, B*10,    h, 0.07, 'sine');    // E4
  n(311, B*10.4,  h, 0.06, 'sine');    // Eb4
  n(294, B*10.8,  h, 0.05, 'sine');    // D4
  n(277, B*11.2,  B, 0.04, 'sine');    // Db4 — final, unresolved

  // Deep final drone
  drone(55, B*10, B*3, 0.10);
  boom(B*10, 0.06);

  // Ghostly final whisper
  nv(440, B*11.5, B*2, 0.03);
}

function rollRarity(floorN){
  const bonus = Math.min(floorN*2, 20);
  const weights = [
    {r:'comune',      w: Math.max(60-bonus,30) },
    {r:'raro',        w: 25 + Math.floor(bonus*0.4) },
    {r:'leggendario', w: 10 + Math.floor(bonus*0.35) },
    {r:'unico',       w:  4 + Math.floor(bonus*0.2)  },
    {r:'maledetto',   w:  1 + Math.floor(bonus*0.05) }
  ];
  const total = weights.reduce((s,e)=>s+e.w,0);
  let r = Math.random()*total;
  for(const e of weights){ r-=e.w; if(r<=0) return e.r; }
  return 'comune';
}

function applyRarityBonus(item, rarityKey, floorN){
  item.rarity = rarityKey;
  item.rarityColor = RARITY[rarityKey].color;
  if(rarityKey==='comune') return;
  const mult = rarityKey==='raro' ? 1.3 : rarityKey==='leggendario' ? 1.7 : rarityKey==='unico' ? 2.2 : 1.5;
  if(item.power) item.power = Math.round(item.power * mult);
  item.magic = item.magic || {};
  if(rarityKey==='raro'){
    const props = ['hpRegen','critBonus','dodgeBonus','atkBonus','defBonus'];
    const p = props[Math.floor(Math.random()*props.length)];
    item.magic[p] = (item.magic[p]||0) + Math.floor(Math.random()*3)+1;
  } else if(rarityKey==='leggendario'){
    item.magic.atkBonus = (item.magic.atkBonus||0) + Math.floor(Math.random()*4)+2;
    item.magic.defBonus = (item.magic.defBonus||0) + Math.floor(Math.random()*3)+1;
    const props = ['hpRegen','critBonus','strBonus','dexBonus','intBonus'];
    const p = props[Math.floor(Math.random()*props.length)];
    item.magic[p] = (item.magic[p]||0) + Math.floor(Math.random()*3)+1;
  } else if(rarityKey==='unico'){
    item.magic.atkBonus = (item.magic.atkBonus||0) + Math.floor(Math.random()*6)+4;
    item.magic.defBonus = (item.magic.defBonus||0) + Math.floor(Math.random()*4)+2;
    item.magic.hpRegen  = (item.magic.hpRegen||0)  + Math.floor(Math.random()*2)+1;
    item.magic.critBonus= (item.magic.critBonus||0) + Math.floor(Math.random()*5)+3;
  } else if(rarityKey==='maledetto'){
    item.magic.atkBonus = (item.magic.atkBonus||0) + Math.floor(Math.random()*8)+6;
    item.magic.defBonus = (item.magic.defBonus||0) + Math.floor(Math.random()*5)+3;
    item.magic.strBonus = (item.magic.strBonus||0) + Math.floor(Math.random()*3)+2;
    item.cursed = true;
    item.curseCharges = 10 + Math.floor(Math.random()*10);
    item._curseBroken = false;
  }
}

function rndItem(floorN) {
  const total = ITEM_POOL.reduce((a,i) => a + i.weight, 0);
  let r = Math.random() * total;
  let it;
  for (const item of ITEM_POOL) {
    r -= item.weight;
    if (r <= 0) { it = { ...item }; break; }
  }
  if (!it) it = { ...ITEM_POOL[0] };
  // Only apply rarity to equipment (weapons, armor, and new slots), not potions/food/gold
  if(it.type==='weapon'||it.type==='armor'||it.type==='headgear'||it.type==='footwear'||it.type==='ring'){
    const rar = rollRarity(floorN||1);
    applyRarityBonus(it, rar, floorN||1);
  }
  return it;
}

// ── Ability engine ──
function canUseAbility(ab) {
  const p = G.player;
  if (ab._cd > 0) return {ok:false, why:`${ab.name} in cooldown (${ab._cd} turns)`};
  if (p.mp < ab.cost.mp) return {ok:false, why:'Not enough MP'};
  return {ok:true};
}

function useAbility(slotIdx) {
  const allAbs = getAllHotbarAbilities();
  const ab = allAbs[slotIdx];
  if (!ab) return;
  const check = canUseAbility(ab);
  if (!check.ok) { msg(check.why, '#f44'); return; }
  const p = G.player;
  const eff = ab.effect;
  p.mp -= ab.cost.mp;
  ab._cd = ab.cd;
  // Track playstyle from ability tags
  const tags = ab.tags || [];
  if (tags.some(t=>['mischia','attacco'].includes(t))) p.style.melee++;
  if (tags.some(t=>['magia','fuoco','gelo','mente'].includes(t))) p.style.magic++;
  if (tags.some(t=>['furtivo','movimento'].includes(t))) p.style.stealth++;
  if (tags.some(t=>['difesa','buff'].includes(t))) p.style.defense++;
  if (tags.some(t=>['cura','morale'].includes(t))) p.style.support++;

  // Abilities that require a directional target
  if (['melee_boost','cleave','backstab','dash','magic_area','magic_bolt'].includes(eff.type)) {
    G.abilityTarget = {ab, eff};
    msg(`${ab.name}: choose direction (WASD/arrows)`, '#ff6');
    return;
  }

  // Abilities with immediate effect
  switch(eff.type) {
    case 'buff':
      addEffect(ab.name, eff.stat, eff.value, eff.turns, '#0af');
      break;
    case 'heal': {
      const amount = eff.base + p.wil * 2;
      const healed = Math.min(amount, p.maxHp - p.hp);
      p.hp += healed;
      msg(`${ab.name}: +${healed} HP!`, '#0f8'); SFX.pickup();
      break;
    }
    case 'regen':
      addEffect(ab.name, 'regen', eff.hpPerTurn, eff.turns, '#0f8');
      break;
    case 'restore_mp': {
      const amount = eff.base + p.wil;
      p.mp = Math.min(p.mp + amount, p.maxMp);
      msg(`${ab.name}: +${amount} MP!`, '#48f');
      break;
    }
    case 'reveal_map':
      for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) G.explored.add(`${x},${y}`);
      msg("The map is permanently revealed!",'#48f');
      break;
    case 'fear': {
      let count=0;
      for (const e of G.entities) {
        if (Math.abs(e.x-p.x)+Math.abs(e.y-p.y)<=eff.radius && vis(e.x,e.y)) {
          e.feared=(e.feared||0)+eff.turns; count++;
        }
      }
      msg(`${ab.name}: ${count} enemies terrified!`, '#a0f');
      break;
    }
  }
  msg(`You use ${ab.name}!`, '#0af'); SFX.hit();
  endTurn();
}

function hasAdjacentFloor(x,y) {
  for (let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++) {
    const nx=x+dx,ny=y+dy;
    if (nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&G.map[ny][nx]===TILE.FLOOR) return true;
  }
  return false;
}

function resolveAbilityTarget(dx, dy) {
  const t = G.abilityTarget;
  if (!t) return false;
  G.abilityTarget = null;
  const p = G.player, eff = t.eff, ab = t.ab;

  function refund() { p.mp+=ab.cost.mp; ab._cd=0; }

  switch(eff.type) {
    case 'melee_boost': {
      const enemy = entityAt(p.x+dx, p.y+dy);
      if (!enemy) { msg('No enemy there!','#f44'); refund(); return true; }
      const d = Math.floor(dmg(p.atk, enemy.def, p.critPct) * eff.mult);
      enemy.hp -= d;
      msg(`${ab.name} on ${enemy.name}: ${d} damage!`, '#fa0'); SFX.crit();
      if (enemy.hp<=0) killEnemy(enemy);
      break;
    }
    case 'cleave': {
      const targets=[];
      for (let cy=-1;cy<=1;cy++) for(let cx=-1;cx<=1;cx++) {
        if (!cx&&!cy) continue;
        const e=entityAt(p.x+cx,p.y+cy); if(e) targets.push(e);
      }
      if (!targets.length) { msg('No adjacent enemies!','#f44'); refund(); return true; }
      for (const e of targets) {
        const d=Math.floor(dmg(p.atk,e.def,p.critPct)*eff.mult);
        e.hp-=d; msg(`Cleave on ${e.name}: ${d}!`,'#fa0');
        if (e.hp<=0) killEnemy(e);
      }
      SFX.crit(); break;
    }
    case 'backstab': {
      const enemy = entityAt(p.x+dx, p.y+dy);
      if (!enemy) { msg('No enemy there!','#f44'); refund(); return true; }
      const notSeen = Math.abs(enemy.x-p.x)+Math.abs(enemy.y-p.y)>enemy.sight;
      const mult = notSeen ? eff.mult : 1.5;
      const d = Math.floor(dmg(p.atk, enemy.def, p.critPct) * mult);
      enemy.hp -= d;
      msg(`${ab.name}${notSeen?' (stealth!)':''}: ${d}!`, '#fa0'); SFX.crit();
      if (enemy.hp<=0) killEnemy(enemy);
      break;
    }
    case 'dash': {
      let moved=0;
      for (let i=0;i<eff.dist;i++) {
        const nx=p.x+dx, ny=p.y+dy;
        if (!walkable(nx,ny)||entityAt(nx,ny)) break;
        p.x=nx; p.y=ny; moved++;
      }
      if (!moved) { msg('Cannot dash there!','#f44'); refund(); return true; }
      msg(`Dash ${moved} tiles!`, '#0ff'); SFX.dodge();
      break;
    }
    case 'magic_area': {
      const cx=p.x+dx*2, cy=p.y+dy*2; let hits=0;
      for (let ay=-eff.radius;ay<=eff.radius;ay++) for(let ax=-eff.radius;ax<=eff.radius;ax++) {
        const e=entityAt(cx+ax,cy+ay);
        if (e) { const d=eff.base+p.int*2+rndInt(5); e.hp-=d; msg(`${ab.name} → ${e.name}: ${d}!`,'#f80'); hits++; if(e.hp<=0)killEnemy(e); }
      }
      if (!hits) msg(`${ab.name} hits no one.`,'#888');
      SFX.crit(); break;
    }
    case 'magic_bolt': {
      let bx=p.x, by=p.y;
      for (let i=0;i<8;i++) {
        bx+=dx; by+=dy; if (!walkable(bx,by)) break;
        const e=entityAt(bx,by);
        if (e) {
          const d=eff.base+p.int*2+rndInt(4); e.hp-=d;
          msg(`${ab.name} → ${e.name}: ${d}!`,'#0af');
          if (eff.status==='slow') { e.slowed=(e.slowed||0)+eff.statusTurns; msg(`${e.name} slowed!`,'#0af'); }
          if (e.hp<=0) killEnemy(e);
          SFX.hit(); break;
        }
      }
      break;
    }
  }
  endTurn();
  return true;
}

function tickAbilityCDs() {
  if (!G.player.abilities) return;
  for (const ab of G.player.abilities) if (ab._cd>0) ab._cd--;
  // Regen (from effects)
  const regen = G.player.effects.find(e=>e.stat==='regen');
  if (regen) { const h=Math.min(regen.value,G.player.maxHp-G.player.hp); if(h>0) G.player.hp+=h; }
  // Passive regen (from synergies)
  const synReg = getSynergyBonuses().regenPassive;
  if (synReg>0) { const h=Math.min(synReg,G.player.maxHp-G.player.hp); if(h>0) G.player.hp+=h; }
  // Enemy status ticks
  for (const e of G.entities) { if(e.feared>0) e.feared--; if(e.slowed>0) e.slowed--; }
}

function getPlaystyleLabel() {
  const s = G.player.style;
  const entries = Object.entries(s).sort((a,b)=>b[1]-a[1]);
  if (entries[0][1]===0) return {label:'Explorer', key:'melee'};
  const labels = {melee:'Warrior', magic:'Mage', stealth:'Shadow', defense:'Guardian', support:'Healer'};
  return {label:labels[entries[0][0]], key:entries[0][0]};
}

function abilityStyleScore(ab) {
  const s = G.player.style;
  const total = s.melee+s.magic+s.stealth+s.defense+s.support+1;
  const tags = ab.tags || [];
  let score = 1; // base score so every ability has a chance
  // Map tags to style categories and add weighted score
  if (tags.some(t=>['mischia','attacco','fisico'].includes(t))) score += s.melee/total;
  if (tags.some(t=>['magia','fuoco','gelo','mente'].includes(t))) score += s.magic/total;
  if (tags.some(t=>['furtivo','movimento'].includes(t))) score += s.stealth/total;
  if (tags.some(t=>['difesa','buff'].includes(t))) score += s.defense/total;
  if (tags.some(t=>['cura','morale','natura'].includes(t))) score += s.support/total;
  return score;
}

function getAbilityChoices() {
  const known = new Set((G.player.abilities||[]).map(a=>a.id));
  const p = G.player;
  const eligible = ABILITY_DEFS.filter(a => {
    if (known.has(a.id)) return false;
    for (const [stat,val] of Object.entries(a.req)) if ((p[stat]||0)<val) return false;
    return true;
  });
  if (eligible.length<=3) return eligible;
  // Weighted random selection: playstyle-aligned abilities appear more often
  const choices = [];
  const pool = [...eligible];
  for (let pick=0; pick<3 && pool.length>0; pick++) {
    const weights = pool.map(a=>abilityStyleScore(a));
    const sum = weights.reduce((a,b)=>a+b,0);
    let r = Math.random()*sum;
    let idx = 0;
    for (let i=0; i<weights.length; i++) { r -= weights[i]; if (r<=0) { idx=i; break; } }
    choices.push(pool[idx]);
    pool.splice(idx,1);
  }
  return choices;
}

// Check if a recipe is known (base or discovered)
function canFuse(item1Name, item2Name) {
  const allRecipes = [...FUSION_RECIPES, ...EXTRA_RECIPES.filter(r=>(G.knownExtraRecipes||new Set()).has(r.id))];
  return allRecipes.find(r =>

// ── Synergy engine ──
function checkSynergies() {
  const p = G.player;
  const abTags = new Set();
  for (const ab of p.abilities) for (const t of ab.tags) abTags.add(t);

  const hasItem = {weapon: !!p.weapon, armor: !!p.armor};
  const oldActive = new Set((G.activeSynergies||[]).map(s=>s.id));
  G.activeSynergies = [];

  for (const syn of SYNERGY_DEFS) {
    let met = true;

    if (syn.needs) {
      // Each entry in needs[] is a set of tags that must ALL be present
      for (const tagGroup of syn.needs) {
        if (!tagGroup.every(t => abTags.has(t))) { met=false; break; }
      }
    }

    if (syn.needsItem) {
      for (const itemType of syn.needsItem) {
        if (!hasItem[itemType]) { met=false; break; }
      }
    }

    if (syn.needsAbTag) {
      for (const t of syn.needsAbTag) {
        if (!abTags.has(t)) { met=false; break; }
      }
    }

    if (!met) continue;

    G.activeSynergies.push(syn);

    // Announce new discoveries
    if (!oldActive.has(syn.id) && !G.discoveredSynergies.has(syn.id)) {
      G.discoveredSynergies.add(syn.id);
      msg(`★ Synergy discovered: ${syn.name}!`, '#f0c');
      msg(`  ${syn.desc}`, '#c8a');
      SFX.levelup();
    }
  }

  // Apply passive bonuses
  recalcStats();
}

function getSynergyBonuses() {
  const bonuses = {atk:0, def:0, critPct:0, dodgePct:0, maxHp:0, maxMp:0,
    regenPassive:0, fireDamage:false, frostReflect:false, doubleStrike:0};
  for (const syn of (G.activeSynergies||[])) {
    if (syn.type==='passive' && syn.bonus) {
      for (const [k,v] of Object.entries(syn.bonus)) {
        if (typeof v === 'boolean') bonuses[k] = bonuses[k] || v;
        else bonuses[k] = (bonuses[k]||0) + v;
      }
    }
  }
  return bonuses;
}

// Get combo abilities from active synergies
function getComboAbilities() {
  return (G.activeSynergies||[]).filter(s=>s.type==='combo');
}

function doBackfire(idx1, idx2, p){
  p = p || G.player;
  const outcomes = [
    // 1: Explosion - damages player
    ()=>{
      const dmg = 5 + Math.floor(Math.random()*10);
      p.hp = Math.max(1, p.hp-dmg);
      msg(`EXPLOSION! The anvil explodes! You take ${dmg} damage!`,'#f44');
      SFX.hurt();
    },
    // 2: Corruption - items become cursed
    ()=>{
      const it = p.inv[idx1];
      if(it){ it.cursed=true; it.curseCharges=15; it._curseBroken=false; it.rarityColor='#c0f'; }
      msg(`CORRUPTION! ${it?it.name:'An item'} has been cursed!`,'#c0f');
    },
    // 3: Broken anvil
    ()=>{
      G.anvilBroken = G.turn + 20;
      msg(`The anvil is broken! It will be usable again in 20 turns`,'#f84');
    },
    // 4: Alien object - one item becomes random weird thing
    ()=>{
      const it = p.inv[idx1];
      const weirdNames = ['Alien Object','Strange Cube','Cosmic Fragment','Unknown Artifact'];
      const nm = weirdNames[Math.floor(Math.random()*weirdNames.length)];
      if(it){ it.name=nm; it.color='#0ff'; it.col='#0ff'; it.rarityColor='#0ff'; it.desc='You do not know what this is'; delete it.type; }
      msg(`The item transformed into: ${nm}!`,'#0ff');
    },
    // 5: Reversed backfire - one random item in inv gets buffed
    ()=>{
      const idx = Math.floor(Math.random()*p.inv.length);
      const it = p.inv[idx];
      if(it && it.power !== undefined){ it.power = (it.power||0)+3; }
      if(it && it.magic){ const k=Object.keys(it.magic)[0]; if(k) it.magic[k]=(it.magic[k]||0)+2; }
      msg(`Reverse backfire! ${it?it.name:'Something'} became more powerful!`,'#ff0');
    }
  ];
  const outcome = outcomes[Math.floor(Math.random()*outcomes.length)];
  outcome();
}

function doFusion(idx1, idx2){
  const p = G.player;
  const a = p.inv[idx1], b = p.inv[idx2];
  if(!a||!b){ msg("Select two valid items",'#f44'); return false; }
  if(a===b){ msg("Cannot combine an item with itself",'#f44'); return false; }

  // Check anvil broken
  if(G.anvilBroken && G.turn<G.anvilBroken){ msg(`The anvil is broken! Repairable in ${G.anvilBroken-G.turn} turns`,'#f44'); return false; }

  const aName = a.name, bName = b.name;

  // Helper to match recipe
  function matches(rx, n1, n2){
    const arr = rx.in || rx.input;
    if(!arr) return false;
    return (arr[0]===n1&&arr[1]===n2)||(arr[0]===n2&&arr[1]===n1);
  }

  // Check TIER3 first (highest priority)
  for(const rx of TIER3_RECIPES){
    if(matches(rx, aName, bName)){
      const out = {...rx.out, magic:{...(rx.out.magic||{})}};
      p.inv.splice(Math.max(idx1,idx2),1); p.inv.splice(Math.min(idx1,idx2),1);
      if(p.inv.length<12) p.inv.push(out);
      G.knownTier3.add(rx.id);
      msg(`DARK LEGEND! You created: ${out.name}!`,'#ff0');
      SFX.levelup();
      return true;
    }
  }

  // Check TIER2
  for(const rx of TIER2_RECIPES){
    if(matches(rx, aName, bName)){
      const out = {...rx.out, magic:{...(rx.out.magic||{})}};
      p.inv.splice(Math.max(idx1,idx2),1); p.inv.splice(Math.min(idx1,idx2),1);
      if(p.inv.length<12) p.inv.push(out);
      G.knownTier2.add(rx.id);
      msg(`ADVANCED CRAFT! You created: ${out.name}!`,'#f80');
      SFX.levelup();
      return true;
    }
  }

  // Check base FUSION_RECIPES (use input field)
  for(const rx of FUSION_RECIPES){
    if(matches(rx, aName, bName)){
      const out = {...rx.output};
      if(out.magic) out.magic={...out.magic};
      p.inv.splice(Math.max(idx1,idx2),1); p.inv.splice(Math.min(idx1,idx2),1);
      if(p.inv.length<12) p.inv.push(out);
      G.knownRecipes = G.knownRecipes||new Set();
      msg(`You created: ${out.name}!`,'#4f4');
      SFX.levelup();
      return true;
    }
  }

  // Check EXTRA_RECIPES known ones (old format uses input)
  for(const rx of EXTRA_RECIPES){
    if(matches(rx, aName, bName)){
      const knownField = rx.in ? G.knownExtraRecipes.has(rx.id) : G.knownExtraRecipes.has(rx.id);
      const outObj = rx.out || rx.output;
      if(!outObj) continue;
      const out = {...outObj};
      if(out.magic) out.magic={...out.magic};
      p.inv.splice(Math.max(idx1,idx2),1); p.inv.splice(Math.min(idx1,idx2),1);
      if(p.inv.length<12) p.inv.push(out);
      G.knownExtraRecipes.add(rx.id);
      msg(`Recipe discovered! You created: ${out.name}!`,'#f80');
      SFX.levelup();
      return true;
    }
  }

  // No recipe found - backfire! (Architectus passive: chance to avoid)
  if (p.classPassive && p.classPassive.craftBonus && Math.random() < p.classPassive.craftBonus) {
    msg('The fusion fails, but your craftsmanship prevents disaster.', '#fa0');
    return false;
  }
  doBackfire(idx1, idx2, p);
  return false;
}

function recalcStats(){
  const p = G.player;
  // Save base stats before magic bonuses
  const bStr = p._baseStr !== undefined ? p._baseStr : p.str;
  const bDex = p._baseDex !== undefined ? p._baseDex : p.dex;
  const bInt = p._baseInt !== undefined ? p._baseInt : p.int;
  p._baseStr = bStr; p._baseDex = bDex; p._baseInt = bInt;

  // Reset to base
  p.str = bStr; p.dex = bDex; p.int = bInt;

  // Collect magic bonuses from all equipped items
  const slots = [p.weapon, p.armor, p.headgear, p.footwear, p.ring1, p.ring2];
  let mAtk=0,mDef=0,mStr=0,mDex=0,mInt=0,mCrit=0,mDodge=0,mHpRegen=0,mMpRegen=0,mFire=0;
  let poisonImmune=false;
  for(const it of slots){
    if(!it || !it.magic) continue;
    const m = it.magic;
    mAtk    += m.atkBonus    || 0;
    mDef    += m.defBonus    || 0;
    mStr    += m.strBonus    || 0;
    mDex    += m.dexBonus    || 0;
    mInt    += m.intBonus    || 0;
    mCrit   += m.critBonus   || 0;
    mDodge  += m.dodgeBonus  || 0;
    mHpRegen+= m.hpRegen     || 0;
    mMpRegen+= m.mpRegen     || 0;
    mFire   += m.fireDamage  || 0;
    if(m.poisonImmune) poisonImmune=true;
  }
  p.str += mStr; p.dex += mDex; p.int += mInt;

  const weaponPow = p.weapon ? p.weapon.power : 0;
  const armorPow  = p.armor  ? p.armor.power  : 0;
  const headPow   = p.headgear ? p.headgear.power : 0;
  const footPow   = p.footwear ? p.footwear.power : 0;

  p.maxHp = 15 + p.vit * 5 + p.lv * 3;
  p.maxMp = 5  + p.wil * 3 + p.int * 1;
  const isRanged = p.weapon && p.weapon.ranged;
  p.atk = (isRanged ? 3 + Math.floor(p.dex*2) + Math.floor(p.lv*0.5)
                     : 3 + Math.floor(p.str*1.5) + weaponPow + Math.floor(p.lv*0.5)) + mAtk;
  p.def = Math.floor(p.vit*0.4) + armorPow + headPow + footPow + Math.floor(p.lv*0.3) + mDef;
  p.critPct  = 5 + p.dex * 1.2 + mCrit;
  p.dodgePct = p.dex * 0.8 + mDodge;
  p._magicHpRegen = mHpRegen;
  p._magicMpRegen = mMpRegen;
  p._fireDamage   = mFire;
  p._poisonImmune = poisonImmune;

  // Apply passive synergy bonuses
  const synB = getSynergyBonuses();
  p.atk += synB.atk; p.def += synB.def;
  p.critPct += synB.critPct; p.dodgePct += synB.dodgePct;
  p.maxHp += synB.maxHp; p.maxMp += synB.maxMp;
  // Apply temporary effects
  for (const eff of p.effects) {
    if (eff.stat === 'atk') p.atk += eff.value;
    if (eff.stat === 'def') p.def += eff.value;
    if (eff.stat === 'maxHp') p.maxHp += eff.value;
    if (eff.stat === 'maxMp') p.maxMp += eff.value;
  }
  // Class passive bonuses
  if (p.classPassive) {
    if (p.classPassive.critBonus) p.critPct += p.classPassive.critBonus;
    if (p.classPassive.sightBonus) p._sightBonus = p.classPassive.sightBonus;
  }
  p.hp = Math.min(p.hp, p.maxHp);
  p.mp = Math.min(p.mp, p.maxMp);
}

function tickEffects() {
  const p = G.player;
  p.effects = p.effects.filter(eff => {
    eff.turns--;
    if (eff.turns <= 0) {
      msg(`${eff.name} fades.`, '#888');
      return false;
    }
    return true;
  });
  recalcStats();
}

    }).filter(Boolean);
    // Restore hotbar (array of IDs or null)
    G.player.hotbar = (pd.hotbar || [null,null,null,null,null]).map(id => {
      if (!id) return null;
      return G.player.abilities.find(a=>a.id===id) ? id : null;
    });
    recalcStats();
    checkSynergies();
    computeFOV();
    updateCam();
    msg('Game loaded!', '#0f8');
    return true;
  } catch(e) { msg('Load error!', '#f44'); return false; }
}

function deleteSave() {
  localStorage.removeItem(SAVE_KEY);
}

function hasSave() {
  return !!localStorage.getItem(SAVE_KEY);
}

// ─────────────────────────────────────────
//  DUNGEON GENERATION
// ─────────────────────────────────────────
function generateMerchantStock() {
  const f = G.floor;
  const stock = [];
  // Always sell potions
  stock.push({...ITEM_POOL[0], price: 15+f*3, known:true}); // Healing Salve
  if (Math.random()<0.5) stock.push({...ITEM_POOL[1], price: 25+f*3, known:true}); // Strength Elixir
  // Weapons scaled to floor
  const weapons = ITEM_POOL.filter(i=>i.type==='weapon');
  const wIdx = Math.min(Math.floor(f/2), weapons.length-1);
  stock.push({...weapons[wIdx], price: 20+weapons[wIdx].power*8, known:true});
  if (wIdx+1<weapons.length && Math.random()<0.4) {
    stock.push({...weapons[wIdx+1], price: 20+weapons[wIdx+1].power*8, known:true});
  }
  // Armor scaled to floor
  const armors = ITEM_POOL.filter(i=>i.type==='armor');
  const aIdx = Math.min(Math.floor(f/3), armors.length-1);
  stock.push({...armors[aIdx], price: 25+armors[aIdx].power*10, known:true});
  // Food: always available (vital in Hardcore)
  stock.push({...ITEM_POOL.find(i=>i.name==='Bread Ration'), price:6+f, known:true});
  if (Math.random()<0.5) stock.push({...ITEM_POOL.find(i=>i.name==='Dried Meat'), price:10+f, known:true});
  // Ammo always available
  stock.push({...ITEM_POOL.find(i=>i.name==='Arrows'), price:8+f*2, known:true});
  if (f>=2 && Math.random()<0.5) {
    stock.push({...ITEM_POOL.find(i=>i.name==='Bolts'), price:12+f*2, known:true});
  }
  // Bow available from floor 2
  if (f>=2) {
    const bowItems = ITEM_POOL.filter(i=>i.ranged);
    const bowIdx = Math.min(Math.floor((f-2)/3), bowItems.length-1);
    stock.push({...bowItems[bowIdx], price:30+bowIdx*15, known:true});
  }
  return stock;
}

function buildFloor() {
  G.map = Array.from({length:ROWS}, () => new Uint8Array(COLS).fill(TILE.WALL));
  G.rooms = [];
  G.entities = [];
  G.items = [];
  G.visible.clear();
  // keep explored between floors? No — reset each floor for tension
  G.explored.clear();

  const targetRooms = Math.min(8 + Math.floor(G.floor * 0.7), 18);

  for (let attempt = 0; attempt < 300 && G.rooms.length < targetRooms; attempt++) {
    const w = 5 + rndInt(9);
    const h = 4 + rndInt(6);
    const x = 1 + rndInt(COLS - w - 2);
    const y = 1 + rndInt(ROWS - h - 2);
    const room = {x, y, w, h, cx: x + (w>>1), cy: y + (h>>1)};
    if (!overlaps(room)) {
      carveRoom(room);
      if (G.rooms.length) connectRooms(G.rooms[G.rooms.length-1], room);
      G.rooms.push(room);
    }
  }

  // Place player center of first room
  const sr = G.rooms[0];
  G.player.x = sr.cx; G.player.y = sr.cy;

  // Place stairs center of last room
  const er = G.rooms[G.rooms.length-1];
  G.map[er.cy][er.cx] = TILE.STAIRS;

  // Place merchant in a middle room (not first, not last)
  if (G.rooms.length>2) {
    const midIdx = 1 + rndInt(G.rooms.length-2);
    const mr = G.rooms[midIdx];
    G.merchant = {
      x: mr.cx, y: mr.cy,
      stock: generateMerchantStock(),
    };
  } else {
    G.merchant = null;
  }

  // Place crafting anvil in another room (50% chance per floor)
  if (G.rooms.length>3 && Math.random()<0.5) {
    // Pick a room that's not first, last, or merchant room
    const candidates = G.rooms.filter((_,i)=>i>0 && i<G.rooms.length-1);
    const cr = candidates[rndInt(candidates.length)];
    if (!G.merchant || cr.cx!==G.merchant.x || cr.cy!==G.merchant.y) {
      G.map[cr.cy][cr.cx] = TILE.ANVIL;
    }
  }

  // Populate rooms (skip first)
  for (let i = 1; i < G.rooms.length; i++) populate(G.rooms[i]);

  // Place boss on boss floor
  if(typeof isBossFloor==='function' && isBossFloor(G.floor) && !G.bossDefeated){
    const bossDef = ENEMY_DEFS.find(e=>e.id==='boss');
    if(bossDef){
      const lastRoom = G.rooms[G.rooms.length-1];
      // Place boss in last room
      let bx, by, tries=0;
      do{
        bx = lastRoom.x+1+rndInt(lastRoom.w-2);
        by = lastRoom.y+1+rndInt(lastRoom.h-2);
        tries++;
      }while((G.map[by][bx]!==TILE.FLOOR || (bx===G.player.x&&by===G.player.y) || entityAt(bx,by)) && tries<50);
      if(tries<50){
        G.entities.push({...JSON.parse(JSON.stringify(bossDef)), x:bx, y:by, maxHp:bossDef.hp});
      }
    }
  }
}

function rndInt(n) { return Math.floor(Math.random()*n); }

function overlaps(r) {
  for (const e of G.rooms) {
    if (r.x < e.x+e.w+1 && r.x+r.w > e.x-1 && r.y < e.y+e.h+1 && r.y+r.h > e.y-1) return true;
  }
  return false;
}

function carveRoom(r) {
  for (let y=r.y; y<r.y+r.h; y++)
    for (let x=r.x; x<r.x+r.w; x++)
      G.map[y][x] = TILE.FLOOR;
}

function connectRooms(a, b) {
  if (Math.random()<0.5) { hline(a.cx,b.cx,a.cy); vline(a.cy,b.cy,b.cx); }
  else                   { vline(a.cy,b.cy,a.cx); hline(a.cx,b.cx,b.cy); }
}
function hline(x1,x2,y) { for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++) G.map[y][x]=TILE.FLOOR; }
function vline(y1,y2,x) { for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++) G.map[y][x]=TILE.FLOOR; }

function populate(room) {
  const f = G.floor;
  // enemies
  const nE = 1 + rndInt(2) + Math.floor(f/4);
  for (let i=0; i<nE; i++) {
    // Only use non-boss enemies for populate
    const nonBossDefs = ENEMY_DEFS.filter(e=>!e.isBoss);
    const maxIdx = Math.min(Math.floor(f/2), nonBossDefs.length-1);
    const def = nonBossDefs[rndInt(maxIdx+1)];
    const bossF = typeof getBossFloor==='function' ? getBossFloor() : 7;
    const bonus = G.bossDefeated && f>bossF
      ? (bossF-1) + Math.floor((f-bossF)*2.5)
      : f-1;
    const pos = freeSpot(room, true);
    if (!pos) continue;
    G.entities.push({
      ...JSON.parse(JSON.stringify(def)),
      x:pos.x, y:pos.y,
      hp:  def.hp  + bonus*3,
      maxHp: def.hp + bonus*3,
      atk: def.atk + Math.floor(bonus*0.6),
      def: def.def + Math.floor(bonus*0.3),
      xp:  def.xp  + bonus*5,
    });
  }
  // items (60% per room, Architectus passive: boosted)
  const itemChance = 0.6 * (G.player.classPassive && G.player.classPassive.itemFind || 1);
  if (Math.random()<itemChance) {
    const pos = freeSpot(room, false);
    if (pos) {
      const item = rndItem(f);
      if (item.type==='gold') item.power = 5 + rndInt(15) + f*3;
      G.items.push({...item, x:pos.x, y:pos.y});
    }
  }
  // Food: always present in Hardcore (40%), rare otherwise (10%)
  const foodChance = G.difficulty==='hardcore' ? 0.40 : 0.10;
  if (Math.random() < foodChance) {
    const pos2 = freeSpot(room, false);
    if (pos2) {
      const foodPool = ITEM_POOL.filter(i=>i.type==='food');
      // In Hardcore rotten food is rarer
      const weights = foodPool.map(fi => fi.rotten ? (G.difficulty==='hardcore'?0.15:0.3) : 1);
      const totalW = weights.reduce((a,b)=>a+b,0);
      let r = Math.random()*totalW;
      let fi = foodPool[0];
      for (let k=0;k<foodPool.length;k++) { r-=weights[k]; if(r<=0){fi=foodPool[k];break;} }
      G.items.push({...fi, x:pos2.x, y:pos2.y});
    }
  }
}

function freeSpot(room, checkEntities) {
  for (let t=0; t<30; t++) {
    const x = room.x+1+rndInt(room.w-2);
    const y = room.y+1+rndInt(room.h-2);
    if (G.map[y][x] !== TILE.FLOOR) continue;
    if (x===G.player.x && y===G.player.y) continue;
    if (G.merchant && x===G.merchant.x && y===G.merchant.y) continue;
    if (checkEntities && entityAt(x,y)) continue;
    if (itemAt(x,y)) continue;
    return {x,y};
  }
  return null;
}

// ─────────────────────────────────────────
//  FOV — simple raycasting
// ─────────────────────────────────────────
function computeFOV() {
  G.visible.clear();
  const {x:px,y:py} = G.player;
  const R = 8 + (G.player._sightBonus||0);
  mark(px,py);
  for (let deg=0; deg<360; deg+=1) {
    const rad = deg * Math.PI/180;
    let rx = px+0.5, ry = py+0.5;
    const dx = Math.cos(rad)*0.4, dy = Math.sin(rad)*0.4;
    for (let i=0; i<R/0.4; i++) {
      rx+=dx; ry+=dy;
      const tx=Math.floor(rx), ty=Math.floor(ry);
      if (tx<0||tx>=COLS||ty<0||ty>=ROWS) break;
      mark(tx,ty);
      if (G.map[ty][tx]===TILE.WALL) break;
    }
  }
}
function mark(x,y) { const k=`${x},${y}`; G.visible.add(k); G.explored.add(k); }

// Line-of-sight check (Bresenham)
function hasLOS(x0,y0,x1,y1) {
  let dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
  let sx=x0<x1?1:-1, sy=y0<y1?1:-1;
  let err=dx-dy, x=x0, y=y0;
  while (true) {
    if (x===x1&&y===y1) return true;
    if (G.map[y]&&G.map[y][x]===TILE.WALL) return false;
    const e2=2*err;
    if (e2>-dy) { err-=dy; x+=sx; }
    if (e2< dx) { err+=dx; y+=sy; }
  }
}

// Get LOS path tiles
function getLOSPath(x0,y0,x1,y1) {
  const path=[];
  let dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
  let sx=x0<x1?1:-1, sy=y0<y1?1:-1;
  let err=dx-dy, x=x0, y=y0;
  while (true) {
    path.push({x,y});
    if (x===x1&&y===y1) break;
    if (G.map[y]&&G.map[y][x]===TILE.WALL) break;
    const e2=2*err;
    if (e2>-dy) { err-=dy; x+=sx; }
    if (e2< dx) { err+=dx; y+=sy; }
  }
  return path;
}

function dist(x0,y0,x1,y1) { return Math.sqrt((x1-x0)**2+(y1-y0)**2); }

// Shoot with equipped bow at target tile
function doShoot(tx, ty) {
  const p = G.player;
  const bow = p.weapon;
  if (!bow || !bow.ranged) { msg('No bow equipped!', '#f44'); return; }
  const ammo = p.inv.find(i=>i.type==='ammo');
  if (!ammo) { msg('No ammo! Find arrows or bolts.', '#f44'); return; }
  const d = dist(p.x,p.y,tx,ty);
  if (d > bow.range) { msg(`Out of range! (max ${bow.range} tiles)`, '#f44'); return; }
  if (!hasLOS(p.x,p.y,tx,ty)) { msg('Line of sight blocked!', '#f44'); return; }
  // Consume ammo
  ammo.qty--;
  if (ammo.qty<=0) p.inv.splice(p.inv.indexOf(ammo),1);
  const remaining = p.inv.find(i=>i.type==='ammo'&&i.name===ammo.name);
  const remQty = remaining ? remaining.qty : 0;
  // Hit check (DEX-based accuracy)
  const hitChance = Math.min(95, 60 + p.dex * 5);
  if (Math.random()*100 > hitChance) {
    msg(`Missed! The ${ammo.name.toLowerCase()} is lost in the dark. (remaining: ${remQty})`, '#888');
    endTurn(); return;
  }
  // Check enemy at target
  const enemy = entityAt(tx,ty);
  if (enemy) {
    const dmgVal = ammo.power + Math.floor(p.dex * 1.5) + Math.floor(p.lv * 0.3);
    enemy.hp -= dmgVal;
    msg(`You hit ${enemy.name} with ${ammo.name} for ${dmgVal} damage! (remaining: ${remQty})`, '#0af'); SFX.hit();
    p.style.magic++; // ranged counts toward style (use magic to track)
    if (enemy.hp<=0) killEnemy(enemy);
  } else {
    msg(`The ${ammo.name.slice(0,-1)||ammo.name} hits the wall. (remaining: ${remQty})`, '#888');
  }
  endTurn();
}

// Throw any item at target tile
function doThrowItem(itemRef, tx, ty) {
  const p = G.player;
  const {item, idx} = itemRef;
  const d = dist(p.x,p.y,tx,ty);
  const maxRange = Math.max(3, 2 + Math.floor(p.str/2));
  if (d > maxRange) { msg(`Cannot throw that far! (max ${maxRange} tiles)`, '#f44'); return; }
  if (!hasLOS(p.x,p.y,tx,ty)) { msg('Line of sight blocked!', '#f44'); return; }
  // Remove item from inventory
  p.inv.splice(idx,1);
  const label = item.known ? item.name : 'item';
  const enemy = entityAt(tx,ty);
  if (enemy) {
    if (item.type==='potion') {
      // Potions apply their effect on enemy (or reverse for healing)
      if (item.effect==='heal') {
        const healAmt = Math.floor(item.power*0.5);
        enemy.hp = Math.min(enemy.maxHp||enemy.hp+healAmt, enemy.hp+healAmt);
        msg(`You throw ${label} at ${enemy.name}: heals it for ${healAmt} HP! Oops!`, '#f44');
      } else if (item.effect==='poison') {
        if (!enemy.poisoned) enemy.poisoned=0;
        enemy.poisoned += item.power;
        msg(`You throw ${label} at ${enemy.name}: poisoned!`, '#0f8'); SFX.hit();
      } else if (item.effect==='strkp') {
        const dmgVal = 3 + Math.floor(p.dex * 0.5);
        enemy.hp -= dmgVal;
        msg(`You throw ${label} at ${enemy.name} for ${dmgVal} damage!`, '#fa0'); SFX.hit();
      } else {
        const dmgVal = 2 + Math.floor(p.str * 0.3);
        enemy.hp -= dmgVal;
        msg(`You throw ${label} at ${enemy.name} for ${dmgVal} damage!`, '#fa0'); SFX.hit();
      }
    } else if (item.type==='weapon') {
      // Weapons: power/2 + STR
      const dmgVal = Math.max(1, Math.floor(item.power*0.6) + Math.floor(p.str*0.4));
      enemy.hp -= dmgVal;
      msg(`You throw ${label} at ${enemy.name} for ${dmgVal} damage!`, '#fa0'); SFX.hit();
    } else if (item.type==='gold') {
      const dmgVal = Math.max(1, Math.floor(item.power/10));
      enemy.hp -= dmgVal;
      msg(`You throw gold at ${enemy.name} for ${dmgVal} damage! (money wasted...)`, '#ff0'); SFX.hit();
    } else {
      const dmgVal = Math.max(1, Math.floor(p.str * 0.3));
      enemy.hp -= dmgVal;
      msg(`You throw ${label} at ${enemy.name} for ${dmgVal} damage!`, '#fa0'); SFX.hit();
    }
    if (enemy.hp<=0) killEnemy(enemy);
  } else {
    // Item lands on the ground at target
    const landItem = {...item, x:tx, y:ty};
    G.items.push(landItem);
    msg(`You throw ${label}: lands at (${tx},${ty}).`, '#888');
  }
  endTurn();
}

function renderRangedOverlay() {
  const p = G.player;
  const t = G.rangedTarget;
  // Draw trajectory line
  if (t) {
    const path = getLOSPath(p.x,p.y,t.x,t.y);
    const camX = G.camX||0, camY = G.camY||0;
    path.forEach(({x,y},i) => {
      const sx = (x-camX)*TS + TS/2;
      const sy = (y-camY)*TS + TS/2;
      ctx.fillStyle = i===0 ? 'rgba(255,255,0,0)' : 'rgba(255,200,0,0.35)';
      ctx.fillRect(sx-TS/2, sy-TS/2, TS, TS);
    });
    // Reticle at target
    if (t) {
      const sx = (t.x-camX)*TS;
      const sy = (t.y-camY)*TS;
      const enemy = entityAt(t.x,t.y);
      ctx.strokeStyle = enemy ? '#f44' : '#ff6';
      ctx.lineWidth=2;
      ctx.strokeRect(sx+1, sy+1, TS-2, TS-2);
      // Cross
      ctx.beginPath();
      ctx.moveTo(sx+TS/2-4, sy+TS/2); ctx.lineTo(sx+TS/2+4, sy+TS/2);
      ctx.moveTo(sx+TS/2, sy+TS/2-4); ctx.lineTo(sx+TS/2, sy+TS/2+4);
      ctx.stroke();
    }
  }
  // HUD text
  const item = G.rangedItem;
  const isShot = !item && p.weapon && p.weapon.ranged;
  const ammo = p.inv.find(i=>i.type==='ammo');
  let hintText;
  if (isShot) {
    const bow = p.weapon;
    hintText = `[AIM] ${bow.name} (range ${bow.range}) | ${ammo?ammo.name+' x'+ammo.qty:'NO AMMO!'} | Arrows: aim | Enter: shoot | Esc: cancel`;
  } else if (item) {
    hintText = `[THROW] ${item.item.name} | Arrows: aim | Enter: throw | Esc: cancel`;
  }
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0, canvas.height-22, canvas.width, 22);
  ctx.fillStyle='#ff6'; ctx.font='11px Courier New';
  ctx.fillText(hintText||'', 10, canvas.height-7);
  ctx.font=FONT;
}
function vis(x,y)  { return G.visible.has(`${x},${y}`); }
function exp(x,y)  { return G.explored.has(`${x},${y}`); }

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────
function entityAt(x,y) { return G.entities.find(e=>e.x===x&&e.y===y)||null; }
function itemAt(x,y)   { return G.items.find(i=>i.x===x&&i.y===y)||null; }
function walkable(x,y) {
  if (x<0||x>=COLS||y<0||y>=ROWS) return false;
  const t=G.map[y][x]; return t===TILE.FLOOR||t===TILE.STAIRS||t===TILE.ANVIL;
}

// ─────────────────────────────────────────
//  MESSAGES
// ─────────────────────────────────────────
function msg(text, col='#bbb') {
  G.messages.unshift({text,col,age:0});
  if (G.messages.length>40) G.messages.pop();
}

// ─────────────────────────────────────────
//  COMBAT
// ─────────────────────────────────────────
function dmg(atk, def, critPct=0) {
  let d = Math.max(1, atk - def + rndInt(4) - 1);
  if (Math.random()*100 < critPct) {
    d = Math.floor(d * 1.8);
    msg('CRITICAL!', '#ff0'); SFX.crit();
  }
  return d;
}
function tryDodge(dodgePct) {
  return Math.random()*100 < dodgePct;
}

// ─────────────────────────────────────────
//  PLAYER ACTIONS
// ─────────────────────────────────────────
function tryMove(dx, dy) {
  if (G.dead || G.lvlUp>0 || G.invOpen || G.rangedMode) return;
  const nx = G.player.x+dx, ny = G.player.y+dy;

  const enemy = entityAt(nx,ny);
  if (enemy) {
    G.player.style.melee++;
    let d = dmg(G.player.atk, enemy.def, G.player.critPct);
    if (G.player.classPassive && G.player.classPassive.meleeDmgMult) d = Math.floor(d * G.player.classPassive.meleeDmgMult);
    const synB = getSynergyBonuses();
    if (synB.fireDamage) { d += 3 + G.player.int; msg('Flaming blade!','#f80'); }
    enemy.hp -= d;
    msg(`You attack ${enemy.name} for ${d} damage!`, '#fa0'); SFX.hit();
    // Double strike chance
    if (synB.doubleStrike && Math.random()*100 < synB.doubleStrike) {
      const d2 = dmg(G.player.atk, enemy.def, G.player.critPct);
      enemy.hp -= d2;
      msg(`Double strike! +${d2} damage!`, '#aaf');
    }
    if (enemy.hp<=0) killEnemy(enemy);
    endTurn(); return;
  }

  if (!walkable(nx,ny)) { SFX.wall(); return; }
  G.player.x=nx; G.player.y=ny; SFX.step();

  // Raccoglie oggetti
  const it = itemAt(nx,ny);
  if (it) pickup(it);

  // Mercante
  if (G.merchant && nx===G.merchant.x && ny===G.merchant.y) {
    G.shopOpen = true;
    G.shopTab = 'buy'; // 'buy' or 'sell'
    msg('The merchant greets you! Buy or sell.', '#f0c'); SFX.pickup();
  }

  if (G.map[ny][nx]===TILE.STAIRS)
    msg('Press > to descend to the next floor.','#0ff');

  // Incudine di fusione
  if (G.map[ny][nx]===TILE.ANVIL) {
    G.craftOpen = true;
    G.craftSelect = -1;
    msg('Fusion Anvil! Combine two items.', '#fa0'); SFX.pickup();
  }

  endTurn();
}

function killEnemy(e) {
  msg(`${e.name} defeated! +${e.xp} XP`, '#0f0'); SFX.kill();
  G.entities = G.entities.filter(x=>x!==e);
  G.player.xp += e.xp;
  G.player.kills = (G.player.kills||0)+1;
  // Reduce curse charges on all equipped items
  const p = G.player;
  const cursedSlots = [p.weapon, p.armor, p.headgear, p.footwear, p.ring1, p.ring2];
  for(const slot of cursedSlots){
    if(slot && slot.cursed && !slot._curseBroken){
      slot.curseCharges--;
      if(slot.curseCharges<=0){
        slot._curseBroken = true;
        msg(`The curse on ${slot.name} is broken!`,'#c0f');
      }
    }
  }
  // Check boss death
  if(e.isBoss){
    G.bossDefeated = true;
    G.pendingVictory = true;
    msg("YOU DEFEATED TEUTATES' WRATH! The darkness recedes...",'#ff0');
    msg("Press [Enter] to see the ending or [C] to continue!",'#f80');
  }
  // Recipe drop: probability based on enemy strength
  const dropChance = e.xp >= 200 ? 0.50 : e.xp >= 60 ? 0.25 : e.xp >= 20 ? 0.12 : 0.05;
  if (Math.random() < dropChance) {
    const undiscovered = EXTRA_RECIPES.filter(r => !G.knownExtraRecipes.has(r.id));
    if (undiscovered.length) {
      const rec = undiscovered[rndInt(undiscovered.length)];
      // Spawn a scroll near the enemy
      const scroll = {
        ch:'~', type:'recipe', name:`Recipe: ${rec.output.name}`,
        col:'#fa0', effect:'recipe', recipeId:rec.id, power:0, known:true, x:e.x, y:e.y
      };
      G.items.push(scroll);
      msg(`${e.name} drops a mysterious scroll!`, '#fa0');
    }
  }
  // Ammo drops (archer-type enemies)
  if (Math.random() < 0.15) {
    const ammoItem = Math.random()<0.7
      ? {...ITEM_POOL.find(i=>i.name==='Arrows'), x:e.x, y:e.y}
      : {...ITEM_POOL.find(i=>i.name==='Bolts'), x:e.x, y:e.y};
    if (ammoItem.name) G.items.push(ammoItem);
  }
  checkLvlUp();
}

function checkLvlUp() {
  while (G.player.xp >= G.player.xpNext) {
    G.player.xp -= G.player.xpNext;
    G.player.lv++;
    G.player.xpNext = Math.floor(G.player.xpNext * 1.6);
    recalcStats();
    G.player.hp = Math.min(G.player.hp + 10, G.player.maxHp);
    G.player.mp = Math.min(G.player.mp + 5, G.player.maxMp);
    G.player.statPts += 3;
    G.lvlUp++;
    msg(`★ LEVEL ${G.player.lv}! Distribute stat points!`, '#ff0'); SFX.levelup();
  }
}

function pickup(item) {
  if (item.type==='gold') {
    G.player.gold += item.power;
    msg(`You pick up ${item.power} gold coins.`, '#ff0'); SFX.pickup();
    G.items = G.items.filter(i=>i!==item);
    return;
  }
  // Ammo: stack with existing
  if (item.type==='ammo') {
    const existing = G.player.inv.find(i=>i.type==='ammo'&&i.name===item.name);
    if (existing) {
      existing.qty += item.qty||1;
      G.items = G.items.filter(i=>i!==item);
      msg(`You pick up ${item.name} (+${item.qty}). Total: ${existing.qty}`, '#fa0'); SFX.pickup();
      return;
    }
  }
  if (G.player.inv.length>=12) { msg(`Inventory full! Cannot pick up: ${item.name}`,'#f44'); return; }
  G.items = G.items.filter(i=>i!==item);
  const copy = {...item};
  // potions unknown until used
  if (item.type==='potion' && !G.identified[item.name]) copy.known=false;
  else copy.known=true;
  G.player.inv.push(copy);
  const label = copy.known ? copy.name : 'Mysterious Potion';
  msg(`You pick up: ${label}`, '#aaf'); SFX.pickup();
}

function useItem(idx) {
  const item = G.player.inv[idx];
  if (!item) return;
  const p = G.player;

  if (item.type==='potion') {
    item.known = true; G.identified[item.name]=true;
    if (item.effect==='heal') {
      const h = Math.min(item.power, p.maxHp-p.hp);
      p.hp += h;
      msg(`You drink ${item.name}. Restore ${h} HP!`, '#0f8');
    } else if (item.effect==='strkp') {
      addEffect('Enhanced Strength', 'atk', item.power, 15, '#0af');
    } else if (item.effect==='poison') {
      p.poison += item.power;
      msg(`You drink ${item.name}. You are poisoned!`, '#f0f');
    }
    p.inv.splice(idx,1);
    endTurn();
  } else if (item.type==='weapon') {
    if(p.weapon && p.weapon.cursed && !p.weapon._curseBroken){ msg("The weapon is cursed! You cannot remove it!",'#c0f'); return; }
    if (p.weapon) p.inv.push(p.weapon);
    p.weapon=item; p.inv.splice(idx,1);
    recalcStats();
    msg(`You equip: ${item.name}${item.ranged?' [BOW - press G to shoot]':'(ATK +'+item.power+')'}`, '#aaf'); checkSynergies();
    endTurn();
  } else if (item.type==='armor') {
    if(p.armor && p.armor.cursed && !p.armor._curseBroken){ msg("The armor is cursed! You cannot remove it!",'#c0f'); return; }
    if (p.armor) p.inv.push(p.armor);
    p.armor=item; p.inv.splice(idx,1);
    recalcStats();
    msg(`You wear: ${item.name} (DEF +${item.power})`, '#0af'); checkSynergies();
    endTurn();
  } else if(item.type==='headgear'){
    if(p.headgear && p.headgear.cursed && !p.headgear._curseBroken){ msg("The item is cursed! You cannot remove it!",'#c0f'); return; }
    p.headgear = item;
    p.inv.splice(idx,1);
    msg(`You equip ${item.name}`,'#4f4');
    recalcStats(); checkSynergies();
    endTurn();
  } else if(item.type==='footwear'){
    if(p.footwear && p.footwear.cursed && !p.footwear._curseBroken){ msg("The item is cursed! You cannot remove it!",'#c0f'); return; }
    p.footwear = item;
    p.inv.splice(idx,1);
    msg(`You equip ${item.name}`,'#4f4');
    recalcStats(); checkSynergies();
    endTurn();
  } else if(item.type==='ring'){
    if(!p.ring1){
      p.ring1 = item; p.inv.splice(idx,1);
      msg(`You equip ${item.name} (ring L)`,'#4f4');
    } else if(!p.ring2){
      p.ring2 = item; p.inv.splice(idx,1);
      msg(`You equip ${item.name} (ring R)`,'#4f4');
    } else {
      if(p.ring1.cursed && !p.ring1._curseBroken){ msg("The ring L is cursed! You cannot remove it!",'#c0f'); return; }
      const old = p.ring1;
      p.ring1 = item; p.inv.splice(idx,1);
      if(p.inv.length<12) p.inv.push(old); else msg(`${old.name} falls to the ground`,'#f84');
      msg(`Replace ring L with ${item.name}`,'#4f4');
    }
    recalcStats(); checkSynergies();
    endTurn();
  } else if (item.type==='ammo') {
    msg(`${item.name}: ${item.qty} remaining. Equip a bow to use them.`, '#fa0');
    return;
  } else if (item.type==='food') {
    if (G.difficulty === 'hardcore') {
      const before = p.hunger ?? 100;
      if (before >= 100) { msg('Not hungry -- already full!', '#888'); return; }
      if (item.rotten && Math.random() < 0.35) {
        p.hunger = Math.min(100, before + Math.floor(item.power * 0.5));
        p.poison += 5;
        msg(`You eat ${item.name}... it was rotten! Poisoned! Hunger: ${p.hunger}/100`, '#f0f');
      } else {
        p.hunger = Math.min(100, before + item.power);
        msg(`You eat ${item.name}. Hunger: ${p.hunger}/100`, '#fa0');
      }
    } else {
      // Facile/Normale: guarisce un po' di HP
      const h = Math.min(Math.max(1, Math.floor(item.power * 0.15)), p.maxHp - p.hp);
      p.hp += h;
      msg(`You eat ${item.name}. ${h > 0 ? '+'+h+' HP' : '(already full)'}`, '#fa0');
    }
    p.inv.splice(idx, 1);
    endTurn();
    return;
  } else if (item.type==='recipe') {
    if (G.knownExtraRecipes.has(item.recipeId)) {
      msg(`You already know this recipe!`, '#888');
    } else {
      G.knownExtraRecipes.add(item.recipeId);
      const rec = EXTRA_RECIPES.find(r=>r.id===item.recipeId);
      p.inv.splice(idx,1);
      msg(`✦ Recipe learned: ${rec ? rec.desc : item.name}!`, '#fa0');
      msg(`  (Use the anvil & to fuse these items)`, '#f80');
      SFX.pickup();
    }
    G.invOpen=false;
    return;
  } else if (item.type==='potion' && item.effect==='both') {
    item.known=true;
    const h = Math.min(item.power, p.maxHp-p.hp);
    p.hp += h;
    addEffect('Enhanced Strength','atk',3,15,'#0af');
    msg(`You drink ${item.name}. +${h} HP and enhanced strength!`, '#f0c');
    p.inv.splice(idx,1);
    endTurn();
  }
  G.invOpen=false;
}

// ─────────────────────────────────────────
function dropItem(idx) {
  const item = G.player.inv[idx];
  if (!item) return;
  G.player.inv.splice(idx,1);
  item.x=G.player.x; item.y=G.player.y;
  G.items.push(item);
  const label = item.known ? item.name : (item.type==='potion'?'Mysterious Potion':'Item');
  msg(`You drop: ${label}`, '#888');
  G.invOpen=false;
}

//  ENEMY AI
// ─────────────────────────────────────────
function enemyTurn() {
  const p = G.player;
  for (const e of G.entities) {
    // Slowed: skip every other turn
    if (e.slowed>0 && G.turn%2===0) continue;
    // Feared: flee from player
    if (e.feared>0) {
      const dx=Math.sign(e.x-p.x), dy=Math.sign(e.y-p.y);
      const nx=e.x+dx, ny=e.y+dy;
      if (walkable(nx,ny)&&!entityAt(nx,ny)) { e.x=nx; e.y=ny; }
      continue;
    }
    const dist = Math.abs(e.x-p.x)+Math.abs(e.y-p.y);
    if (dist<=1) {
      if (tryDodge(p.dodgePct)) {
        msg(`You dodge ${e.name}'s attack!`, '#0ff'); SFX.dodge();
      } else {
        const d = dmg(e.atk, p.def);
        p.hp -= d;
        msg(`${e.name} attacks you for ${d} damage!`, '#f44'); SFX.hurt();
        // Frost reflect
        const synFR = getSynergyBonuses();
        if (synFR.frostReflect) {
          const reflect = 2 + Math.floor(p.int*0.5);
          e.hp -= reflect; msg(`Frost reflect: ${reflect} damage to ${e.name}!`, '#0af');
          if (e.hp<=0) { killEnemy(e); continue; }
        }
        if (p.hp<=0) { G.dead=true; msg('YOU DIED. Press R to restart.','#f00'); SFX.death(); return; }
      }
    } else if (dist<=e.sight && vis(e.x,e.y)) {
      chasePlayer(e);
    } else if (Math.random()<0.3) {
      // random wander
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      const [dx,dy] = dirs[rndInt(4)];
      const nx=e.x+dx, ny=e.y+dy;
      if (walkable(nx,ny) && !entityAt(nx,ny)) { e.x=nx; e.y=ny; }
    }
  }
}

function chasePlayer(e) {
  const p = G.player;
  const dx = Math.sign(p.x-e.x), dy = Math.sign(p.y-e.y);
  const moves = [];
  if (dx!==0&&dy!==0) moves.push([dx,dy]);
  if (dx!==0) moves.push([dx,0]);
  if (dy!==0) moves.push([0,dy]);
  moves.push([-dy,dx],[dy,-dx]); // perpendicular
  for (const [mx,my] of moves) {
    const nx=e.x+mx, ny=e.y+my;
    if (walkable(nx,ny) && !entityAt(nx,ny) && !(nx===p.x&&ny===p.y)) {
      e.x=nx; e.y=ny; return;
    }
  }
}

// ─────────────────────────────────────────
//  END TURN
// ─────────────────────────────────────────
function endTurn() {
  G.turn++;
  tickEffects();
  tickAbilityCDs();
  const p = G.player;

  // ── Difficulty: Easy — passive regen ──
  if (G.difficulty === 'easy') {
    if (G.turn % 8 === 0 && p.hp < p.maxHp) p.hp = Math.min(p.maxHp, p.hp+1);
    if (G.turn % 5 === 0 && p.mp < p.maxMp) p.mp = Math.min(p.maxMp, p.mp+1);
  }

  // Magic item passive regen
  if(p._magicHpRegen && G.turn%4===0) p.hp = Math.min(p.maxHp, p.hp+p._magicHpRegen);
  if(p._magicMpRegen && G.turn%4===0) p.mp = Math.min(p.maxMp, p.mp+p._magicMpRegen);

  // ── Difficulty: Hardcore — hunger ──
  if (G.difficulty === 'hardcore') {
    if (G.turn % 4 === 0) {
      p.hunger = Math.max(0, (p.hunger ?? 100) - 1);
      if (p.hunger === 60) msg('You are hungry. Find food.', '#fa0');
      else if (p.hunger === 30) msg('You are very hungry!', '#f80');
      else if (p.hunger === 10) msg('You are starving!', '#f44');
      else if (p.hunger === 0) {
        p.hp = Math.max(0, p.hp - 2);
        msg('Starving to death! -2 HP', '#f44'); SFX.hurt();
        if (p.hp <= 0) { G.dead = true; SFX.death(); msg('You starved to death. Press R.','#f00'); }
      }
    }
  }

  if (p.poison > 0) {
    p.hp -= 1;
    p.poison--;
    if (p.hp <= 0) { G.dead=true; msg('You died of poisoning. Press R.','#f00'); }
  }
  if (!G.dead) enemyTurn();
  computeFOV();
  updateCam();
}

// ─────────────────────────────────────────
//  CAMERA
// ─────────────────────────────────────────
function updateCam() {
  const vw = Math.floor(canvas.width/TS);
  const vh = Math.floor(canvas.height/TS);
  G.camX = clamp(G.player.x - (vw>>1), 0, Math.max(0, COLS-vw));
  G.camY = clamp(G.player.y - (vh>>1), 0, Math.max(0, ROWS-vh));
}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function toScreen(tx,ty){return {sx:(tx-G.camX)*TS, sy:(ty-G.camY)*TS};}

// ─────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────
function loop() {
  render();
  updateHUD();
}

function render() {
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.font = FONT;
  ctx.textBaseline='top';

  if (G.victoryScreen){ renderVictory(); return; }
  if (G.helpOpen) { renderHelp(); return; }
  if (G.abilitiesOpen) { renderAbilitiesScreen(); renderHUD(); return; }
  if (G.shopOpen) { renderShop(); renderHUD(); return; }
  if (G.craftOpen) { renderCraft(); renderHUD(); return; }
  if (G.lvlUp>0)  { renderLvlUp(); return; }
  if (G.invOpen)  { renderInv();  renderHUD(); return; }
  if (G.rangedMode) { renderMap(); renderItems(); renderEntities(); renderMerchant(); renderPlayer(); renderHotbar(); renderHUD(); renderMsgOverlay(); renderRangedOverlay(); return; }

  renderMap();
  renderItems();
  renderEntities();
  renderMerchant();
  renderPlayer();
  renderHotbar();
  renderHUD();
  renderMsgOverlay();

  if (G.abilityTarget) renderTargetHint();
  if (G.abilityChoices) { renderAbilityChoice(); return; }
  if (G.dead) renderDeath();
}

function renderMap() {
  const vw = Math.ceil(canvas.width/TS)+1;
  const vh = Math.ceil(canvas.height/TS)+1;
  for (let ty=G.camY; ty<Math.min(G.camY+vh,ROWS); ty++) {
    for (let tx=G.camX; tx<Math.min(G.camX+vw,COLS); tx++) {
      const isV = vis(tx,ty), isE = exp(tx,ty);
      if (!isE) continue;
      const t = G.map[ty][tx];
      const {sx,sy} = toScreen(tx,ty);
      switch(t) {
        case TILE.WALL:
          ctx.fillStyle = isV ? '#4a4a3a' : '#2a2a1a';
          ctx.fillRect(sx, sy, TS, TS);
          // wall border for depth effect
          ctx.fillStyle = isV ? '#5a5a4a' : '#3a3a2a';
          ctx.fillRect(sx, sy, TS, 2);
          ctx.fillRect(sx, sy, 2, TS);
          ctx.fillStyle = isV ? '#3a3a2a' : '#1a1a10';
          ctx.fillRect(sx, sy+TS-2, TS, 2);
          ctx.fillRect(sx+TS-2, sy, 2, TS);
          break;
        case TILE.FLOOR:
          ctx.fillStyle = isV ? '#141410' : '#0a0a08';
          ctx.fillRect(sx, sy, TS, TS);
          // puntino sottile al centro per texture pavimento
          ctx.fillStyle = isV ? '#1e1e18' : '#101010';
          ctx.fillRect(sx+TS/2-1, sy+TS/2-1, 2, 2);
          break;
        case TILE.STAIRS:
          ctx.fillStyle = isV ? '#141410' : '#0a0a08';
          ctx.fillRect(sx, sy, TS, TS);
          ctx.font = EFONT;
          ctx.fillText('🪜', sx+2, sy+2);
          ctx.font = FONT;
          break;
        case TILE.ANVIL:
          ctx.fillStyle = isV ? '#141410' : '#0a0a08';
          ctx.fillRect(sx, sy, TS, TS);
          ctx.font = EFONT;
          ctx.fillText('⚒️', sx+2, sy+2);
          ctx.font = FONT;
          break;
        default: continue;
      }
    }
  }
}

function renderItems() {
  for (const item of G.items) {
    if (!exp(item.x,item.y)) continue;
    const isV = vis(item.x,item.y);
    const {sx,sy} = toScreen(item.x,item.y);
    if (!isV) { ctx.globalAlpha = 0.4; }
    ctx.font = EFONT;
    ctx.fillText(item.ch, sx+2, sy+2);
    ctx.font = FONT;
    ctx.globalAlpha = 1;
  }
}

function renderEntities() {
  const hasSeeEnemies = G.player.classPassive && G.player.classPassive.seeEnemies;
  for (const e of G.entities) {
    const visible = vis(e.x,e.y);
    if (!visible && !hasSeeEnemies) continue;
    if (!visible) ctx.globalAlpha = 0.35; // Haruspex: dimmed enemies outside FOV
    const {sx,sy} = toScreen(e.x,e.y);
    // hp bar
    const bw=TS-2, hpf=e.hp/e.maxHp;
    ctx.fillStyle='#300'; ctx.fillRect(sx,sy+TS-4,bw,3);
    ctx.fillStyle=hpf>0.5?'#0f0':hpf>0.25?'#ff0':'#f00';
    ctx.fillRect(sx,sy+TS-4,Math.max(1,Math.floor(bw*hpf)),3);
    // emoji
    ctx.font = EFONT;
    ctx.fillText(e.ch, sx+2, sy+1);
    ctx.font = FONT;
    ctx.globalAlpha = 1;
  }
}

function renderMerchant() {
  if (!G.merchant) return;
  const m = G.merchant;
  if (!vis(m.x,m.y)&&!exp(m.x,m.y)) return;
  const {sx,sy} = toScreen(m.x,m.y);
  if (!vis(m.x,m.y)) { ctx.globalAlpha = 0.4; }
  ctx.font = EFONT;
  ctx.fillText('🧔', sx+2, sy+2);
  ctx.font = FONT;
  ctx.globalAlpha = 1;
}

function renderPlayer() {
  const {sx,sy}=toScreen(G.player.x,G.player.y);
  ctx.font=EFONT;
  ctx.fillText('🏛️',sx+2,sy+2);
  ctx.font=FONT;
}

function getAllHotbarAbilities() {
  // 5 fixed slots (null = empty) + synergy combos at the end
  const p = G.player;
  const main = p.hotbar.map(id => id ? p.abilities.find(a => a.id === id) || null : null);
  const combos = getComboAbilities().map(s => { if (!s._cd) s._cd=0; return s; });
  return [...main, ...combos];
}

function renderHotbar() {
  const allAbs = getAllHotbarAbilities(); // 5 main (con null) + combos
  const keys = ['Q','E','R','T','Y','U','O','P'];
  const barY = 8;
  // always show 5 fixed slots + active combos
  const shown = allAbs.slice(0, keys.length);
  const barX = canvas.width - shown.length * 60 - 10;
  for (let i=0; i<shown.length; i++) {
    const ab = shown[i];
    const x = barX + i*60;
    if (!ab) {
      // Empty slot
      ctx.fillStyle='#0d0d0d';
      ctx.fillRect(x, barY, 55, 30);
      ctx.strokeStyle='#2a2a2a';
      ctx.lineWidth=1;
      ctx.strokeRect(x, barY, 55, 30);
      ctx.fillStyle='#444'; ctx.font='bold 10px Courier New';
      ctx.fillText(keys[i], x+2, barY+10);
      ctx.fillStyle='#2a2a2a'; ctx.font='10px Courier New';
      ctx.fillText('empty', x+10, barY+22);
      continue;
    }
    const onCD = ab._cd > 0;
    const noMP = G.player.mp < ab.cost.mp;
    const isCombo = ab.type === 'combo';
    ctx.fillStyle = onCD ? '#1a1a2a' : noMP ? '#1a1010' : isCombo ? '#2a1a2a' : '#1a2a1a';
    ctx.fillRect(x, barY, 55, 30);
    ctx.strokeStyle = onCD ? '#666' : isCombo ? '#fa0' : '#0af';
    ctx.lineWidth=1;
    ctx.strokeRect(x, barY, 55, 30);
    ctx.fillStyle = isCombo ? '#fa0' : '#ff6';
    ctx.font='bold 10px Courier New';
    ctx.fillText(keys[i], x+2, barY+10);
    ctx.fillStyle = onCD ? '#999' : '#fff';
    ctx.font='11px Courier New';
    ctx.fillText(`${ab.icon}${ab.name.substring(0,5)}`, x+12, barY+10);
    ctx.fillStyle='#888'; ctx.font='9px Courier New';
    if (onCD) ctx.fillText(`CD:${ab._cd}`, x+2, barY+24);
    else ctx.fillText(`MP:${ab.cost.mp}`, x+2, barY+24);
  }
  ctx.font=FONT;
}

function renderTargetHint() {
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(canvas.width/2-120, 0, 240, 22);
  ctx.fillStyle='#ff6';
  ctx.font='bold 12px Courier New';
  ctx.textAlign='center';
  ctx.fillText('Choose direction (WASD/arrows) | Esc cancel', canvas.width/2, 15);
  ctx.textAlign='left';
  ctx.font=FONT;
}

function renderAbilityChoice() {
  ctx.fillStyle='rgba(0,0,0,0.85)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/2;
  ctx.textAlign='center';
  ctx.font='bold 22px Courier New';
  ctx.fillStyle='#ff6';
  ctx.fillText('CHOOSE A NEW ABILITY', cx, 60);
  const ps = getPlaystyleLabel();
  ctx.font='13px Courier New';
  ctx.fillStyle='#fa0';
  ctx.fillText(`Style: ${ps.label}`, cx, 85);
  ctx.fillStyle='#aaa';
  ctx.font='11px Courier New';
  ctx.fillText('(or press [S] to skip)', cx, 102);

  const choices = G.abilityChoices;
  choices.forEach((ab, i) => {
    const y = 130 + i * 80;
    ctx.fillStyle='#1a2a3a';
    ctx.fillRect(cx-250, y, 500, 65);
    ctx.strokeStyle='#0af';
    ctx.lineWidth=1;
    ctx.strokeRect(cx-250, y, 500, 65);
    // Key
    ctx.fillStyle='#ff6';
    ctx.font='bold 18px Courier New';
    ctx.fillText(`[${i+1}]`, cx-220, y+25);
    // Icon + name
    ctx.fillStyle='#fff';

function renderInv(){
  const p = G.player;
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle='#111'; ctx.fillRect(0,0,W,H);
  ctx.font='bold 15px monospace';

  const lineH = 22;
  let y = 24;

  // Title
  ctx.fillStyle='#ff0'; ctx.textAlign='center';
  ctx.fillText('=== INVENTORY ===', W/2, y); y+=lineH+4;
  ctx.textAlign='left';

  const totalRows = 6 + p.inv.length;
  if(G.invCursor===undefined) G.invCursor=0;
  G.invCursor = Math.max(0, Math.min(G.invCursor, totalRows-1));

  // Equipment slots
  const eqSlots = [
    { label:'⚔️ Weapon   ', item: p.weapon   },
    { label:'🛡️ Armor    ', item: p.armor    },
    { label:'🪖 Headgear ', item: p.headgear },
    { label:'👢 Footwear ', item: p.footwear },
    { label:'💍 Ring L   ', item: p.ring1    },
    { label:'💍 Ring R   ', item: p.ring2    },
  ];

  ctx.font='14px monospace';
  ctx.textBaseline='bottom';
  const fontH = 16; // altezza visiva del font 14px
  for(let i=0;i<eqSlots.length;i++){
    const row = i;
    const sel = G.invCursor===row;
    if(sel){ ctx.fillStyle='#333'; ctx.fillRect(0, y-fontH, W, fontH+2); }
    ctx.fillStyle = sel ? '#fff' : '#888';
    ctx.fillText(eqSlots[i].label+': ', 8, y);
    if(eqSlots[i].item){
      const it = eqSlots[i].item;
      ctx.fillStyle = it.rarityColor || (it.cursed ? '#c0f' : '#4f4');
      let nm = it.name;
      if(it.cursed && !it._curseBroken) nm += ` [CURSED ${it.curseCharges}]`;
      else if(it.cursed && it._curseBroken) nm += ' [freed]';
      ctx.fillText(nm, 160, y);
      if(it.power){ ctx.fillStyle='#aaa'; ctx.fillText(` +${it.power}`, 160+ctx.measureText(nm).width, y); }
    } else {
      ctx.fillStyle='#444'; ctx.fillText('(empty)', 160, y);
    }
    if(sel && eqSlots[i].item){ ctx.fillStyle='#f84'; ctx.fillText('[X] drop', W-80, y); }
    y+=lineH;
  }

  // Separator
  ctx.fillStyle='#555';
  ctx.fillRect(0,y-4,W,1); y+=8;
  ctx.fillStyle='#888'; ctx.font='13px monospace';
  ctx.fillText('--- Backpack ---', 8, y); y+=lineH;

  // Backpack items
  ctx.font='14px monospace';
  for(let i=0;i<p.inv.length;i++){
    const row = 6+i;
    const sel = G.invCursor===row;
    const it = p.inv[i];
    if(sel){ ctx.fillStyle='#333'; ctx.fillRect(0, y-fontH, W, fontH+2); }
    ctx.fillStyle = sel ? '#fff' : '#888';
    ctx.fillText(`${i+1}.`, 8, y);
    const label = it.known!==false ? it.name : 'Mysterious Potion';
    ctx.fillStyle = it.rarityColor || (it.type==='potion'?'#f4f':it.type==='weapon'?'#f84':it.type==='armor'?'#48f': it.col||'#4f4');
    const fullLabel = `${it.ch} ${label}`;
    ctx.fillText(fullLabel, 32, y);
    const tw = ctx.measureText(fullLabel).width;
    if(it.power){ ctx.fillStyle='#aaa'; ctx.fillText(` +${it.power}`, 32+tw, y); }
    if(it.qty){ ctx.fillStyle='#888'; ctx.fillText(` x${it.qty}`, 32+tw+(it.power?40:0), y); }
    y+=lineH;
  }
  ctx.textBaseline='alphabetic';

  // Ability hotbar (right column)
  const rx = Math.floor(W * 0.55);
  ctx.fillStyle='#0af'; ctx.font='bold 13px monospace';
  ctx.fillText('── HOTBAR ──', rx, 46);
  const hotkeys = ['Q','E','R','T','Y'];
  const LH = 28;
  p.hotbar.forEach((abId, i)=>{
    const ab = abId ? p.abilities.find(a=>a.id===abId) : null;
    const ay = 60 + i * LH;
    ctx.fillStyle='#ff6'; ctx.font='bold 11px monospace';
    ctx.fillText(`[${hotkeys[i]}]`, rx, ay);
    if(ab){
      ctx.fillStyle='#fff'; ctx.font='bold 11px monospace';
      ctx.fillText(`${ab.icon} ${ab.name}`, rx+26, ay);
    } else {
      ctx.fillStyle='#555'; ctx.font='11px monospace';
      ctx.fillText('— empty —', rx+26, ay);
    }
  });

  // Stats panel (right column, below hotbar)
  const statsY = 210;
  ctx.fillStyle='#fa0'; ctx.font='bold 13px monospace';
  ctx.fillText('── STATISTICS ──', rx, statsY);
  ctx.font='13px monospace';
  const baseStr = p._baseStr !== undefined ? p._baseStr : p.str;
  const baseDex = p._baseDex !== undefined ? p._baseDex : p.dex;
  const baseInt = p._baseInt !== undefined ? p._baseInt : p.int;
  const bonusStr = p.str - baseStr, bonusDex = p.dex - baseDex, bonusInt = p.int - baseInt;
  const statLines = [
    { label:'STR', val:p.str, base:baseStr, bonus:bonusStr, col:'#f84' },
    { label:'DEX', val:p.dex, base:baseDex, bonus:bonusDex, col:'#8f4' },
    { label:'INT', val:p.int, base:baseInt, bonus:bonusInt, col:'#48f' },
    { label:'VIT', val:p.vit, base:p.vit, bonus:0, col:'#f44' },
    { label:'WIL', val:p.wil, base:p.wil, bonus:0, col:'#c4f' },
  ];
  statLines.forEach((s, i) => {
    const sy2 = statsY + 18 + i * 18;
    ctx.fillStyle = s.col;
    ctx.fillText(`${s.label} ${s.val}`, rx, sy2);
    if (s.bonus > 0) { ctx.fillStyle='#0f8'; ctx.fillText(` (+${s.bonus})`, rx+56, sy2); }
  });
  const sy3 = statsY + 18 + statLines.length * 18 + 8;
  ctx.fillStyle='#888'; ctx.font='12px monospace';
  ctx.fillText(`HP ${p.hp}/${p.maxHp}  MP ${p.mp}/${p.maxMp}`, rx, sy3);
  ctx.fillText(`ATK ${p.atk}  DEF ${p.def}`, rx, sy3+16);
  ctx.fillText(`CRIT ${Math.floor(p.critPct)}%  DODGE ${Math.floor(p.dodgePct)}%`, rx, sy3+32);
  ctx.fillText(`Gold: ${p.gold}  Lv: ${p.lv}`, rx, sy3+48);

  // Footer
  y = H-48;
  ctx.fillStyle='#666'; ctx.font='12px monospace';
  ctx.fillText('ArrowUp/Down move  [Enter] use  [X] drop equipped  [I/Esc] close', 8, y);
  ctx.fillText(`Backpack: ${p.inv.length}/12  Gold: ${p.gold}`, 8, y+16);
  ctx.font=FONT;
}

function renderShop() {
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const p=G.player;
  const m=G.merchant;

  ctx.font='bold 20px Courier New';
  ctx.fillStyle='#f0c';
  ctx.fillText('═══ MERCHANT ═══', 40, 30);
  ctx.fillStyle='#ff0';
  ctx.font='13px Courier New';
  ctx.fillText(`Gold: ${p.gold}`, 300, 30);

  // Tab selector
  ctx.fillStyle = G.shopTab==='buy' ? '#f0c' : '#aaa';
  ctx.fillText('[B] BUY', 40, 55);
  ctx.fillStyle = G.shopTab==='sell' ? '#f0c' : '#aaa';
  ctx.fillText('[V] SELL', 160, 55);
  ctx.fillStyle = G.shopTab==='curse' ? '#c0f' : '#aaa';
  ctx.fillText('[C] REMOVE CURSE (150 gold)', 260, 55);

  ctx.fillStyle='#888';
  ctx.fillText('─'.repeat(50), 40, 68);

  if (G.shopTab==='buy') {
    if (!m.stock.length) {
      ctx.fillStyle='#aaa'; ctx.fillText('(sold out)', 40, 90);
    }
    m.stock.forEach((item,i) => {
      const canBuy = p.gold >= item.price;
      const isCursor = (i === G.shopCursor && G.shopTab==='buy');
      if (isCursor) { ctx.fillStyle='#112211'; ctx.fillRect(34, 76+i*20, 380, 18); }
      ctx.fillStyle = isCursor ? '#ff6' : '#555';
      ctx.fillText('►', 36, 88+i*20);
      ctx.fillStyle = canBuy ? (isCursor ? '#fff' : item.col) : '#888';
      ctx.fillText(`${item.ch} ${item.name}`, 50, 88 + i*20);
      ctx.fillStyle = canBuy ? '#ff0' : '#888';
      ctx.fillText(`${item.price} gold`, 280, 88 + i*20);
      const rangedInfo = item.ranged ? ` [Arco R:${item.range}]` : '';
      if (item.type==='weapon') { ctx.fillStyle='#888'; ctx.fillText(`ATK +${item.power}${rangedInfo}`, 370, 88+i*20); }
      if (item.type==='armor')  { ctx.fillStyle='#888'; ctx.fillText(`DEF +${item.power}`, 370, 88+i*20); }
      if (item.type==='ammo')   { ctx.fillStyle='#888'; ctx.fillText(`x${item.qty}`, 370, 88+i*20); }
    });
  } else if (G.shopTab==='sell') {
    if (!p.inv.length) {
      ctx.fillStyle='#aaa'; ctx.fillText('(inventory empty)', 40, 90);
    }
    p.inv.forEach((item,i) => {
      const sellPrice = getSellPrice(item);
      const label = item.known ? item.name : 'Unknown item';
      const isCursor = (i === G.shopCursor && G.shopTab==='sell');
      if (isCursor) { ctx.fillStyle='#112211'; ctx.fillRect(34, 76+i*20, 380, 18); }
      ctx.fillStyle = isCursor ? '#ff6' : '#555';
      ctx.fillText('►', 36, 88+i*20);
      ctx.fillStyle = isCursor ? '#fff' : item.col;
      ctx.fillText(`${item.ch} ${label}`, 50, 88 + i*20);
      ctx.fillStyle='#ff0';
      ctx.fillText(`→ ${sellPrice} gold`, 280, 88 + i*20);
    });
  }

  if(G.shopTab==='curse'){
    const cursedSlot = [p.weapon,p.armor,p.headgear,p.footwear,p.ring1,p.ring2].find(s=>s&&s.cursed&&!s._curseBroken);
    ctx.fillStyle='#aaa'; ctx.font='13px Courier New';
    if(!cursedSlot){
      ctx.fillText('No cursed items equipped.', 40, 95);
    } else {
      ctx.fillStyle='#c0f';
      ctx.fillText(`Cursed item found: ${cursedSlot.name} (${cursedSlot.curseCharges} charges)`, 40, 95);
      ctx.fillStyle= p.gold>=150 ? '#0f8' : '#f44';
      ctx.fillText(`Removal cost: 150 gold (you have: ${p.gold})`, 40, 115);
      ctx.fillStyle='#aaa';
      ctx.fillText('[Enter] to remove the curse', 40, 135);
    }
  }

  ctx.fillStyle='#999';
  ctx.font='12px Courier New';
  ctx.fillText('Up/Down: navigate  |  Enter: buy/sell  |  [B] buy  |  [V] sell  |  [C] curse  |  Esc: exit', 40, canvas.height-20);
  ctx.font=FONT;
}

function getSellPrice(item) {
  if (item.type==='weapon') return 5 + item.power * 4;
  if (item.type==='armor') return 5 + item.power * 5;
  if (item.type==='potion') return 5;
  return 3;
}

function shopBuy(idx) {
  const m=G.merchant, p=G.player;
  const item = m.stock[idx];
  if (!item) return;
  if (p.gold < item.price) { msg('Not enough gold!','#f44'); return; }
  if (p.inv.length>=12) { msg('Inventory full!','#f44'); return; }
  p.gold -= item.price;
  p.inv.push({...item});
  m.stock.splice(idx,1);
  msg(`You buy: ${item.name} (-${item.price} gold)`, '#f0c'); SFX.pickup();
}

function shopSell(idx) {
  const p=G.player;
  const item = p.inv[idx];
  if (!item) return;
  const price = getSellPrice(item);
  p.gold += price;
  p.inv.splice(idx,1);
  msg(`You sell: ${item.known?item.name:'item'} (+${price} gold)`, '#ff0'); SFX.pickup();
}

  ctx.fillText('Up/Down: navigate  |  1-5: equip to slot  |  X: remove from slot  |  F / Esc: close', canvas.width/2, canvas.height-12);
  ctx.textAlign='left'; ctx.font=FONT;
}

function renderHelp() {
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/2;
  ctx.textAlign='center';
  ctx.font='bold 20px Courier New';
  ctx.fillStyle='#ff6';
  ctx.fillText('═══ HELP ═══', cx, 24);

  // Left column
  const col1 = [
    ['MOVEMENT',''],
    ['W/S/A/D  or  Arrows','Move'],
    ['Y U B N','Diagonals'],
    ['',''],
    ['ACTIONS',''],
    ['. / Z','Wait a turn'],
    ['>','Descend stairs'],
    ['I','Inventory'],
    ['? / F1','Help'],
    ['R','Restart (death)'],
    ['',''],
    ['INVENTORY',''],
    ['0-9','Use/equip'],
    ['D + 0-9','Drop item'],
    ['',''],
    ['ABILITIES',''],
    ['F','Manage abilities (slots)'],
    ['Q E R T Y','Use ability slot 1-5'],
    ['U O P','Combo (synergies)'],
  ];

  // Right column
  const col2 = [
    ['COMBAT',''],
    ['','Walk toward enemy'],
    ['',''],
    ['SYNERGIES',''],
    ['','Ability combos → synergies'],
    ['','Passive: auto bonus'],
    ['','Combo: new abilities'],
    ['','Anvil (&): fuse items'],
    ['',''],
    ['SYMBOLS',''],
    ['@  Player','#  Wall'],
    ['.  Floor','>  Stairs'],
    ['!  Potion','$  Gold'],
    [')  Weapon','[  Armor'],
    ['M  Merchant','&  Anvil'],
    ['r g O T','Enemies'],
  ];

  ctx.font='12px Courier New';
  const lh=16, startY=50;
  const drawCol = (lines, ox) => {
    let y=startY;
    for (const [left,right] of lines) {
      if (!left&&!right) { y+=6; continue; }
      if (!right && left===left.toUpperCase() && left.length>2) {
        ctx.fillStyle='#0f8'; ctx.font='bold 12px Courier New';
        ctx.fillText(left, ox+100, y);
        ctx.font='12px Courier New';
      } else {
        ctx.textAlign='right';
        ctx.fillStyle='#ff6'; ctx.fillText(left, ox+90, y);
        ctx.textAlign='left';
        ctx.fillStyle='#aaa'; ctx.fillText(right, ox+100, y);
      }
      y+=lh;
    }
  };

  drawCol(col1, 20);
  drawCol(col2, canvas.width/2 + 10);

  ctx.textAlign='center';
  ctx.fillStyle='#aaa';
  ctx.fillText('Press any key to close', cx, canvas.height-12);
  ctx.textAlign='left'; ctx.font=FONT;
}

function updateHUD() {
  const p=G.player;
  const hpCol = p.hp>p.maxHp*0.5?'#0f0':p.hp>p.maxHp*0.25?'#ff0':'#f44';
  const mpCol = p.mp>p.maxMp*0.3?'#48f':'#f44';
  document.getElementById('hud-hp').innerHTML=`<span style="color:${hpCol}">HP ${p.hp}/${p.maxHp}</span>`;
  document.getElementById('hud-mp').innerHTML=`<span style="color:${mpCol}">MP ${p.mp}/${p.maxMp}</span>`;
  document.getElementById('hud-atk').textContent=`ATK ${p.atk}`;
  document.getElementById('hud-def').textContent=`DEF ${p.def}`;
  document.getElementById('hud-lv').textContent=`Lv ${p.lv}`;
  document.getElementById('hud-xp').textContent=`XP ${p.xp}/${p.xpNext}`;
  document.getElementById('hud-floor').textContent=`Floor ${G.floor}`;
  document.getElementById('hud-gold').textContent=`Gold ${p.gold}`;
  document.getElementById('hud-poison').style.display = p.poison>0?'':'none';
  // Hunger (Hardcore only)
  const hungerEl = document.getElementById('hud-hunger');
  if (G.difficulty === 'hardcore' && p.hunger !== undefined) {
    const h = p.hunger;
    const hCol = h > 60 ? '#8f8' : h > 30 ? '#fa0' : '#f44';
    hungerEl.innerHTML = ` | <span style="color:${hCol}">🍗 ${h}/100</span>`;
    hungerEl.style.display = '';
  } else { hungerEl.style.display = 'none'; }
  // Difficulty badge
  const diffEl = document.getElementById('hud-difficulty');
  if (diffEl) {
    const dmap = {easy:'[EASY]', normal:'', hardcore:'[HARDCORE]'};
    const dcol = {easy:'#8f8', normal:'', hardcore:'#f44'};
    const d = G.difficulty || 'normal';
    diffEl.innerHTML = dmap[d] ? `<span style="color:${dcol[d]};font-size:10px"> ${dmap[d]}</span>` : '';
  }
  const effText = p.effects.map(e=>`${e.name}(${e.turns})`).join(' ');
  document.getElementById('hud-effects').textContent = effText ? ` ${effText}` : '';
  const synText = (G.activeSynergies||[]).map(s=>s.icon||'★').join('');
  document.getElementById('hud-synergies').textContent = synText ? ` ${synText}` : '';
  document.getElementById('hud-synergies').title = (G.activeSynergies||[]).map(s=>s.name).join(', ');
  renderMsgBox();
}

function renderHUD() { updateHUD(); }

function renderMsgBox() {
  const box=document.getElementById('msgbox');
  box.innerHTML = G.messages.slice(0,6).map((m,i)=>{
    const op = Math.max(0.15, 1-i*0.18);
    return `<div class="msg" style="color:${m.col};opacity:${op}">${m.text}</div>`;
  }).join('');
}

function dimColor(hex) {
  // parse #rrggbb and halve each component
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const d=(v)=>Math.floor(v*0.35).toString(16).padStart(2,'0');
  return `#${d(r)}${d(g)}${d(b)}`;
}
